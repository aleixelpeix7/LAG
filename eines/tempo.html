<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Temporitzador | LAG</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #002244;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: #FAFAF9;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    nav {
      background-color: rgba(0, 0, 0, 0.7);
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1rem 2rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav li.logo {
      display: flex;
      align-items: center;
    }

    nav li.logo a {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    nav li.logo img {
      height: 60px;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    nav li.enllacos {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffff66;
    }

    :root { --wrap-w:400px; }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    /* Pantalla d'inici */
    #startScreen {
      margin-top: 40px;
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #334155;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    #startScreen h2 {
      margin: 0;
      font-size: 22px;
    }

    .timeInputs {
      display: flex;
      gap: 10px;
    }

    .timeInputs input {
      width: 70px;
      padding: 6px;
      font-size: 18px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #1e293b;
      color: white;
    }

    select {
      width: 220px;
      padding: 8px;
      font-size: 16px;
      border-radius: 6px;
      background: #1e293b;
      color: white;
      border: 1px solid #475569;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #FFDF20;
      color: #111;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #FACC15;
    }

    /* Botó de pujar fitxer personalitzat */
    .fileRow {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    #uploadSound {
      display: none;
    }

    #uploadLabel {
      background: #FFDF20;
      color: #111827;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: background-color 0.2s, transform 0.1s;
    }

    #uploadLabel:hover {
      background: #FACC15;
      transform: translateY(-1px);
    }

    #fileName {
      font-size: 12px;
      color: #E5E7EB;
      opacity: 0.9;
      max-width: 180px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    /* Pantalla del temporitzador */
    #timerScreen {
      display: none;
      margin-top: 40px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #timeDisplay {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #circleContainer {
      width: 260px;
      height: 260px;
      position: relative;
    }

    #circleContainer svg {
      transform: rotate(-90deg);
    }

    #timerButtons {
      display: flex;
      gap: 12px;
    }

    #pauseBtn, #stopBtn, #stopAlarmBtn {
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #FFDF20;
      color: #111;
      font-weight: bold;
    }

    #pauseBtn:hover, #stopBtn:hover, #stopAlarmBtn:hover {
      background: #FACC15;
    }
  </style>
</head>
<body>
<nav>
  <ul>
    <li class="logo">
      <a href="https://lagg.netlify.app">
        <img src="assets/logo.png" alt="Logo GLS" />
      </a>
    </li>
    <li class="enllacos">
      <a href="https://lagg.netlify.app">Inici</a>
      <a href="https://lagg.netlify.app/minijocs/">Minijocs</a>
      <a href="https://lagg.netlify.app/minecraft/">Minecraft</a>
      <a href="https://lagg.netlify.app/contacte">Contactar</a>
    </li>
  </ul>
</nav>

<div id="startScreen">
  <h2>⏱ Temporitzador</h2>

  <div class="timeInputs">
    <input id="hours" type="number" min="0" max="24" value="0">
    <input id="minutes" type="number" min="0" max="59" value="0">
    <input id="seconds" type="number" min="0" max="59" value="30">
  </div>

  <select id="soundSelect"></select>

  <div class="fileRow">
    <label id="uploadLabel" for="uploadSound">Puja un so</label>
    <input type="file" id="uploadSound" accept="audio/mp3,audio/mpeg">
    <span id="fileName">Cap fitxer seleccionat</span>
  </div>

  <button id="startBtn">Inicia</button>
</div>

<div id="timerScreen">
  <div id="circleContainer">
    <svg width="260" height="260">
      <circle cx="130" cy="130" r="120" stroke="#334155" stroke-width="18" fill="none"/>
      <circle id="progressCircle" cx="130" cy="130" r="120" stroke="#FFDF20" stroke-width="18" fill="none"
              stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="0"/>
    </svg>
    <div id="timeDisplay" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
      00:00:00
    </div>
  </div>

  <div id="timerButtons">
    <button id="pauseBtn">Pausa</button>
    <button id="stopBtn">Parar</button>
    <button id="stopAlarmBtn" style="display:none;">Atura l'alarma</button>
  </div>

  <audio id="alarmSound" loop></audio>
</div>

<script>
  const predefinedSounds = [
    { name: "Clàssic", file: "assets/tempo_ring.mp3" },
    { name: "Campaneta", file: "assets/bell.mp3" },
    { name: "Digital", file: "assets/digital.mp3" }
  ];

  const soundSelect = document.getElementById("soundSelect");
  const uploadSound = document.getElementById("uploadSound");
  const fileNameSpan = document.getElementById("fileName");
  const alarmSound = document.getElementById("alarmSound");

  const startScreen = document.getElementById("startScreen");
  const timerScreen = document.getElementById("timerScreen");

  const hours = document.getElementById("hours");
  const minutes = document.getElementById("minutes");
  const seconds = document.getElementById("seconds");

  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const stopBtn = document.getElementById("stopBtn");
  const stopAlarmBtn = document.getElementById("stopAlarmBtn");

  const timeDisplay = document.getElementById("timeDisplay");
  const progressCircle = document.getElementById("progressCircle");

  let totalSeconds = 0;
  let remaining = 0;
  let interval = null;
  let paused = false;

  let animInterval = null;
  let lastTickTime = null;

  const CIRCUMFERENCE = 2 * Math.PI * 120;
  progressCircle.style.strokeDasharray = CIRCUMFERENCE;
  progressCircle.style.strokeDashoffset = 0;

  function loadSounds() {
    soundSelect.innerHTML = "";
    predefinedSounds.forEach((s) => {
      const opt = document.createElement("option");
      opt.value = s.file;
      opt.textContent = s.name;
      soundSelect.appendChild(opt);
    });
  }

  loadSounds();

  uploadSound.addEventListener("change", () => {
    const file = uploadSound.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    fileNameSpan.textContent = file.name;

    let customOpt = Array.from(soundSelect.options).find(o => o.dataset && o.dataset.custom === "true");
    if (!customOpt) {
      customOpt = document.createElement("option");
      customOpt.dataset.custom = "true";
      soundSelect.appendChild(customOpt);
    }
    customOpt.value = url;
    customOpt.textContent = "So personalitzat";

    soundSelect.value = url;
  });

  function format(t) {
    const h = String(Math.floor(t / 3600)).padStart(2, "0");
    const m = String(Math.floor((t % 3600) / 60)).padStart(2, "0");
    const s = String(t % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  }

  function updateCircleSmooth(now) {
    if (!totalSeconds || totalSeconds <= 0) {
      progressCircle.style.strokeDashoffset = 0;
      return;
    }
    const elapsed = totalSeconds - remaining;
    const ratio = Math.max(0, Math.min(1, elapsed / totalSeconds));
    const offset = ratio * CIRCUMFERENCE;
    progressCircle.style.strokeDashoffset = offset;
  }

  function startAnimationLoop() {
    if (animInterval) clearInterval(animInterval);
    animInterval = setInterval(() => {
      updateCircleSmooth(performance.now());
    }, 1000 / 60);
  }

  function stopAnimationLoop() {
    if (animInterval) {
      clearInterval(animInterval);
      animInterval = null;
    }
  }

  function startTimer() {
    const h = Math.min(24, Math.max(0, parseInt(hours.value) || 0));
    const m = Math.min(59, Math.max(0, parseInt(minutes.value) || 0));
    const s = Math.min(59, Math.max(0, parseInt(seconds.value) || 0));

    totalSeconds = h * 3600 + m * 60 + s;
    remaining = totalSeconds;

    if (totalSeconds <= 0) return;

    alarmSound.src = soundSelect.value;

    startScreen.style.display = "none";
    timerScreen.style.display = "flex";

    paused = false;
    pauseBtn.textContent = "Pausa";
    pauseBtn.style.display = "inline-block";
    stopBtn.style.display = "inline-block";
    stopAlarmBtn.style.display = "none";

    timeDisplay.textContent = format(remaining);
    updateCircleSmooth(performance.now());
    startAnimationLoop();

    if (interval) clearInterval(interval);
    interval = setInterval(() => {
      if (!paused) {
        remaining--;
        if (remaining < 0) remaining = 0;
        timeDisplay.textContent = format(remaining);

        if (remaining <= 0) {
          clearInterval(interval);
          interval = null;

          pauseBtn.style.display = "none";
          stopBtn.style.display = "none";
          stopAlarmBtn.style.display = "inline-block";

          updateCircleSmooth(performance.now());
          alarmSound.currentTime = 0;
          alarmSound.play();
          stopAnimationLoop();
        }
      }
    }, 1000);
  }

  startBtn.addEventListener("click", startTimer);

  pauseBtn.addEventListener("click", () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "Reprèn" : "Pausa";
  });

  stopBtn.addEventListener("click", () => {
    if (interval) {
      clearInterval(interval);
      interval = null;
    }
    alarmSound.pause();
    alarmSound.currentTime = 0;
    stopAnimationLoop();

    timerScreen.style.display = "none";
    startScreen.style.display = "flex";

    pauseBtn.style.display = "inline-block";
    stopBtn.style.display = "inline-block";
    stopAlarmBtn.style.display = "none";

    progressCircle.style.strokeDashoffset = 0;
  });

  stopAlarmBtn.addEventListener("click", () => {
    alarmSound.pause();
    alarmSound.currentTime = 0;

    stopAlarmBtn.style.display = "none";

    timerScreen.style.display = "none";
    startScreen.style.display = "flex";

    pauseBtn.style.display = "inline-block";
    stopBtn.style.display = "inline-block";

    progressCircle.style.strokeDashoffset = 0;
  });
</script>
</body>
</html>
