<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Temporitzador</title>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #container {
            margin-top: 60px;
        }

        #timeDisplay {
            font-size: 80px;
            margin: 30px 0;
            font-weight: bold;
        }

        input {
            width: 70px;
            font-size: 24px;
            text-align: center;
            margin: 5px;
            padding: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            font-size: 22px;
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background-color: #666;
        }
    </style>
</head>

<body>

    <div id="container">
        <h1>Temporitzador</h1>

        <div>
            <label>Minuts:</label>
            <input type="number" id="minInput" min="0" value="0">

            <label>Segons:</label>
            <input type="number" id="secInput" min="0" max="59" value="30">
        </div>

        <div id="timeDisplay">00:30</div>

        <button onclick="startTimer()">Inicia</button>
        <button onclick="stopSound()">Para el so</button>

        <audio id="alarmSound" src="assets/tempo_ring.mp3" loop></audio>
    </div>

    <script>
        let interval = null;
        let remaining = 0;

        function updateDisplay() {
            let m = Math.floor(remaining / 60);
            let s = remaining % 60;

            document.getElementById("timeDisplay").textContent =
                (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        }

        function startTimer() {
            let min = parseInt(document.getElementById("minInput").value);
            let sec = parseInt(document.getElementById("secInput").value);

            remaining = min * 60 + sec;

            if (remaining <= 0) return;

            updateDisplay();

            if (interval) clearInterval(interval);

            interval = setInterval(() => {
                remaining--;
                updateDisplay();

                if (remaining <= 0) {
                    clearInterval(interval);
                    document.getElementById("alarmSound").play();
                }
            }, 1000);
        }

        function stopSound() {
            const alarm = document.getElementById("alarmSound");
            alarm.pause();
            alarm.currentTime = 0;
        }
    </script>

</body>
</html>
