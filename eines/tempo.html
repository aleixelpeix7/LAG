<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Temporitzador | LAG</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <style>
  body {
    margin: 0;
    padding: 0;
    background-color: #002244;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    color: #FAFAF9;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  nav {
    background-color: rgba(0, 0, 0, 0.7);
    position: sticky;
    top: 0;
    width: 100%;
    z-index: 100;
    padding: 1rem 2rem;
  }

  nav ul {
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  nav li.logo {
    display: flex;
    align-items: center;
  }

  nav li.logo a {
    display: flex;
    align-items: center;
    text-decoration: none;
  }

  nav li.logo img {
    height: 60px;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  nav li.enllacos {
    display: flex;
    gap: 2rem;
  }

  nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #ffff66;
  }

  .enllac-inici {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 20px;
    color: #FF2056;
    text-decoration: underline;
    font-weight: bold;
    z-index: 1000;
  }

  .enllac-inici:hover {
    color: #FF637E;
  }

  :root { --wrap-w:400px; }

  h1{
    margin: 0;
    font-size: 20px;
  }

  #gameWrap {
    position: relative;
    width: var(--wrap-w);
    margin-top: 8px;
  }

  /* Estil original del canvas (no l'usem, però el mantenim per coherència visual) */
  canvas {
    width: 100%;
    height: auto;
    display: block;
    background: #222;
    border: 2px solid #555;
  }

  #score {
    color: white;
    font-size: 14px;
    margin: 6px 0 0 0;
  }

  .canvas-button {
    position: absolute;
    background: #FFDF20;
    color: #FB2C36;
    border: 1px solid #888;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    user-select: none;
    z-index: 20;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .hidden{
    display: none;
  }

  /* --- Estils del temporitzador --- */

  #timerContainer {
    background: #111827;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 16px 12px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #timeDisplay {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
    background: #020617;
    border-radius: 6px;
    padding: 10px 18px;
    border: 1px solid #4b5563;
    min-width: 180px;
    text-align: center;
  }

  #timerInputs {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #timerInputs label {
    font-size: 14px;
  }

  #timerInputs input {
    width: 70px;
    font-size: 18px;
    text-align: center;
    padding: 4px 6px;
    border-radius: 6px;
    border: 1px solid #4b5563;
    background: #020617;
    color: #F9FAFB;
  }

  #timerButtons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #timerButtons button {
    font-size: 16px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background-color: #FFDF20;
    color: #111827;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: background-color 0.2s, transform 0.1s;
  }

  #timerButtons button:hover {
    background-color: #FACC15;
    transform: translateY(-1px);
  }

  #timerButtons button:active {
    transform: translateY(0);
  }

  #timerNote {
    font-size: 12px;
    color: #E5E7EB;
    opacity: 0.8;
    text-align: center;
  }
  </style>
</head>
<body>
<nav>
  <ul>
    <li class="logo">
      <a href="https://lagg.netlify.app">
        <img src="assets/logo.png" alt="Logo GLS" />
      </a>
    </li>
    <li class="enllacos">
      <a href="https://lagg.netlify.app">Inici</a>
      <a href="https://lagg.netlify.app/minijocs/">Minijocs</a>
      <a href="https://lagg.netlify.app/minecraft/">Minecraft</a>
      <a href="https://lagg.netlify.app/contacte">Contactar</a>
    </li>
  </ul>
</nav>

<h1>⏱ Temporitzador</h1>

<div id="gameWrap">
  <div id="timerContainer">
    <div id="timerInputs">
      <label for="minInput">Minuts:</label>
      <input type="number" id="minInput" min="0" value="0">
      <label for="secInput">Segons:</label>
      <input type="number" id="secInput" min="0" max="59" value="30">
    </div>

    <div id="timeDisplay">00:30</div>

    <div id="timerButtons">
      <button id="startBtn">Inicia</button>
      <button id="stopSoundBtn">Para el so</button>
      <button id="resetBtn">Reinicia</button>
    </div>

    <p id="timerNote">Quan el temps arribi a zero, sonarà una alarma en bucle fins que la paris.</p>

    <audio id="alarmSound" src="assets/tempo_ring.mp3" loop></audio>
  </div>
</div>

<p id="score" class="hidden">Puntuació: 0</p>

<script>
  let interval = null;
  let remaining = 0;

  const minInput = document.getElementById('minInput');
  const secInput = document.getElementById('secInput');
  const timeDisplay = document.getElementById('timeDisplay');
  const startBtn = document.getElementById('startBtn');
  const stopSoundBtn = document.getElementById('stopSoundBtn');
  const resetBtn = document.getElementById('resetBtn');
  const alarmSound = document.getElementById('alarmSound');

  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    const mm = m < 10 ? '0' + m : String(m);
    const ss = s < 10 ? '0' + s : String(s);
    return mm + ':' + ss;
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
  }

  function startTimer() {
    const min = parseInt(minInput.value, 10) || 0;
    const sec = parseInt(secInput.value, 10) || 0;

    remaining = min * 60 + sec;

    if (remaining <= 0) return;

    updateDisplay();

    if (interval) clearInterval(interval);

    interval = setInterval(() => {
      remaining--;
      updateDisplay();

      if (remaining <= 0) {
        clearInterval(interval);
        interval = null;
        remaining = 0;
        updateDisplay();
        alarmSound.currentTime = 0;
        alarmSound.play();
      }
    }, 1000);
  }

  function stopSound() {
    alarmSound.pause();
    alarmSound.currentTime = 0;
  }

  function resetTimer() {
    if (interval) {
      clearInterval(interval);
      interval = null;
    }
    stopSound();
    const min = parseInt(minInput.value, 10) || 0;
    const sec = parseInt(secInput.value, 10) || 0;
    remaining = min * 60 + sec;
    if (remaining <= 0) {
      remaining = 0;
    }
    updateDisplay();
  }

  startBtn.addEventListener('click', startTimer);
  stopSoundBtn.addEventListener('click', stopSound);
  resetBtn.addEventListener('click', resetTimer);

  // Inicialitza el display amb els valors per defecte
  (function init() {
    const min = parseInt(minInput.value, 10) || 0;
    const sec = parseInt(secInput.value, 10) || 0;
    remaining = min * 60 + sec;
    updateDisplay();
  })();
</script>
</body>
</html>
