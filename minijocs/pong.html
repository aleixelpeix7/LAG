<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pong | LAG</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #002244;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      color: #FAFAF9;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      background-color: rgba(0, 0, 0, 0.7);
      position: sticky;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      z-index: 100;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav li.logo img {
      height: 60px;
      margin-right: 0.5rem;
    }

    nav li.enllacos {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover { color: #ffff66; }

    /* Targeta del joc */
    #gameCard {
      margin-top: 40px;
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #334155;
      width: 760px;
      max-width: 95%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      position: relative;
    }

    canvas {
      background: #111;
      border: 2px solid #fff;
      border-radius: 8px;
    }

    /* Menú inicial, pausa i victòria */
    .menuBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #334155;
      text-align: center;
      width: 300px;
      display: none;
      z-index: 10;
    }

    .menuBox h3 {
      margin-bottom: 15px;
    }

    .menuBox button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #FFDF20;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      color: #111;
    }

    .menuBox button:hover {
      background: #FACC15;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li class="logo">
      <a href="https://lagg.netlify.app">
        <img src="assets/logo.png" alt="Logo GLS" />
      </a>
    </li>
    <li class="enllacos">
      <a href="https://lagg.netlify.app">Inici</a>
      <a href="https://lagg.netlify.app/minijocs/">Minijocs</a>
      <a href="https://lagg.netlify.app/minecraft/">Minecraft</a>
      <a href="https://lagg.netlify.app/jocs3d/">Jocs 3D</a>
      <a href="https://lagg.netlify.app/eines/">Eines</a>
      <a href="https://lagg.netlify.app/contacte">Contactar</a>
    </li>
  </ul>
</nav>

<!-- 🎮 TARGETA DEL JOC -->
<div id="gameCard">
  <h2>🏓 Pong</h2>

  <canvas id="pongCanvas" width="700" height="400"></canvas>

  <!-- MENÚ INICIAL -->
  <div id="startMenu" class="menuBox" style="display:block;">
    <h3>🏓 PONG</h3>
    <button onclick="chooseMode('solo')">Jugar sol</button>
    <button onclick="startTwoPlayers()">Jugar amb un amic</button>

    <div id="difficultyBox" style="margin-top:15px; display:none;">
      <h4>Dificultat</h4>
      <button onclick="startSolo('easy')">Fàcil</button>
      <button onclick="startSolo('medium')">Mitjà</button>
      <button onclick="startSolo('hard')">Difícil</button>
    </div>
  </div>

  <!-- MENÚ PAUSA -->
  <div id="pauseMenu" class="menuBox">
    <h3>⏸ Pausa</h3>
    <button onclick="resumeGame()">Reprendre</button>
    <button onclick="returnToStart()">Tornar a l'inici</button>
  </div>

  <!-- MENÚ VICTÒRIA -->
  <div id="winMenu" class="menuBox">
    <h3 id="winText">Has guanyat!</h3>
    <button onclick="returnToStart()">Tornar a l'inici</button>
  </div>
</div>

<script>
/* -------------------------
   VARIABLES DEL JOC
--------------------------*/
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

let player1 = { x: 20, y: canvas.height/2 - 40, w: 10, h: 80, score: 0 };
let player2 = { x: canvas.width - 30, y: canvas.height/2 - 40, w: 10, h: 80, score: 0 };

let ball = { x: canvas.width/2, y: canvas.height/2, r: 7, vx: 5, vy: 5 };

let up1 = false, down1 = false;
let up2 = false, down2 = false;

let gameRunning = false;
let paused = false;
let mode = null; // solo / two
let aiSpeed = 3;

/* -------------------------
   MENÚ INICIAL
--------------------------*/
function chooseMode(m) {
  mode = m;
  if (m === "solo") {
    document.getElementById("difficultyBox").style.display = "block";
  }
}

function startSolo(diff) {
  if (diff === "easy") aiSpeed = 2;
  if (diff === "medium") aiSpeed = 3.5;
  if (diff === "hard") aiSpeed = 5;

  startGame();
}

function startTwoPlayers() {
  mode = "two";
  startGame();
}

function startGame() {
  document.getElementById("startMenu").style.display = "none";
  resetGame();
  gameRunning = true;
}

/* -------------------------
   PAUSA
--------------------------*/
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && gameRunning) {
    paused = !paused;
    document.getElementById("pauseMenu").style.display = paused ? "block" : "none";
  }
});

function resumeGame() {
  paused = false;
  document.getElementById("pauseMenu").style.display = "none";
}

function returnToStart() {
  paused = false;
  gameRunning = false;
  document.getElementById("pauseMenu").style.display = "none";
  document.getElementById("winMenu").style.display = "none";
  document.getElementById("startMenu").style.display = "block";
}

/* -------------------------
   MOVIMENT
--------------------------*/
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") up1 = true;
  if (e.key === "ArrowDown") down1 = true;

  if (mode === "two") {
    if (e.key === "w") up2 = true;
    if (e.key === "s") down2 = true;
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowUp") up1 = false;
  if (e.key === "ArrowDown") down1 = false;

  if (mode === "two") {
    if (e.key === "w") up2 = false;
    if (e.key === "s") down2 = false;
  }
});

/* -------------------------
   RESET
--------------------------*/
function resetBall() {
  ball.x = canvas.width/2;
  ball.y = canvas.height/2;
  ball.vx = (Math.random() > 0.5 ? 5 : -5);
  ball.vy = (Math.random() * 4 - 2);
}

function resetGame() {
  player1.score = 0;
  player2.score = 0;
  resetBall();
}

/* -------------------------
   UPDATE
--------------------------*/
function update() {
  if (!gameRunning || paused) return;

  // Moviment jugador 1
  if (up1) player1.y -= 5;
  if (down1) player1.y += 5;

  // Moviment jugador 2 o IA
  if (mode === "two") {
    if (up2) player2.y -= 5;
    if (down2) player2.y += 5;
  } else {
    if (player2.y + player2.h/2 < ball.y) player2.y += aiSpeed;
    else player2.y -= aiSpeed;
  }

  // Límits
  player1.y = Math.max(0, Math.min(canvas.height - player1.h, player1.y));
  player2.y = Math.max(0, Math.min(canvas.height - player2.h, player2.y));

  // Moviment pilota
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Rebot parets
  if (ball.y < 0 || ball.y > canvas.height) ball.vy *= -1;

  // Col·lisions
  if (ball.x - ball.r < player1.x + player1.w &&
      ball.y > player1.y && ball.y < player1.y + player1.h) {
    ball.vx *= -1.1;
  }

  if (ball.x + ball.r > player2.x &&
      ball.y > player2.y && ball.y < player2.y + player2.h) {
    ball.vx *= -1.1;
  }

  // Punts
  if (ball.x < 0) { player2.score++; resetBall(); }
  if (ball.x > canvas.width) { player1.score++; resetBall(); }

  // Victòria
  if (player1.score >= 15 || player2.score >= 15) {
    gameRunning = false;
    document.getElementById("winText").textContent =
      player1.score > player2.score ? "Has guanyat!" : "Ha guanyat l'altre!";
    document.getElementById("winMenu").style.display = "block";
  }
}

/* -------------------------
   DIBUIX
--------------------------*/
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Línia central
  ctx.fillStyle = "#444";
  for (let i = 0; i < canvas.height; i += 20) {
    ctx.fillRect(canvas.width/2 - 2, i, 4, 10);
  }

  // Jugadors
  ctx.fillStyle = "#fff";
  ctx.fillRect(player1.x, player1.y, player1.w, player1.h);
  ctx.fillRect(player2.x, player2.y, player2.w, player2.h);

  // Pilota
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  // Marcador
  ctx.font = "32px Arial";
  ctx.fillText(player1.score, canvas.width/2 - 60, 40);
  ctx.fillText(player2.score, canvas.width/2 + 30, 40);
}

/* -------------------------
   LOOP
--------------------------*/
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
