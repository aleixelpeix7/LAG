<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Minijoc Breakout</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #jocContainer {
      position: relative;
    }

    canvas {
      background: #000;
      border: 2px solid #444;
      display: block;
    }

    #info {
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      pointer-events: none;
    }

    .lives span {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="jocContainer">
    <canvas id="joc" width="480" height="320"></canvas>
    <div id="info">
      <div class="lives" id="lives"></div>
      <div id="score">Punts: 0</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("joc");
    const ctx = canvas.getContext("2d");

    // Mides bàsiques
    const paddleHeight = 10;
    const paddleWidth = 75;
    let paddleX = (canvas.width - paddleWidth) / 2;

    const ballRadius = 6;
    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let dx = 3;
    let dy = -3;

    let rightPressed = false;
    let leftPressed = false;

    // Bricks
    const brickRowCount = 5;
    const brickColumnCount = 8;
    const brickWidth = 50;
    const brickHeight = 16;
    const brickPadding = 6;
    const brickOffsetTop = 40;
    const brickOffsetLeft = 15;

    let bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
      bricks[c] = [];
      for (let r = 0; r < brickRowCount; r++) {
        // Pots canviar colors per files per fer-ho més xulo
        const colors = ["#3fa9f5", "#ff4b4b", "#ffd93b", "#4caf50", "#9c27b0"];
        bricks[c][r] = {
          x: 0,
          y: 0,
          status: 1,
          color: colors[r % colors.length]
        };
      }
    }

    let score = 0;
    let lives = 3;

    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);

    function keyDownHandler(e) {
      if (e.key === "Right" || e.key === "ArrowRight") {
        rightPressed = true;
      } else if (e.key === "Left" || e.key === "ArrowLeft") {
        leftPressed = true;
      }
    }

    function keyUpHandler(e) {
      if (e.key === "Right" || e.key === "ArrowRight") {
        rightPressed = false;
      } else if (e.key === "Left" || e.key === "ArrowLeft") {
        leftPressed = false;
      }
    }

    function collisionDetection() {
      for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
          const b = bricks[c][r];
          if (b.status === 1) {
            if (
              x > b.x &&
              x < b.x + brickWidth &&
              y > b.y &&
              y < b.y + brickHeight
            ) {
              dy = -dy;
              b.status = 0;
              score++;
              if (score === brickRowCount * brickColumnCount) {
                alert("Has guanyat! 🎉");
                document.location.reload();
              }
            }
          }
        }
      }
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.closePath();
    }

    function drawPaddle() {
      ctx.beginPath();
      ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.closePath();
    }

    function drawBricks() {
      for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
          if (bricks[c][r].status === 1) {
            const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
            const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
            bricks[c][r].x = brickX;
            bricks[c][r].y = brickY;
            ctx.beginPath();
            ctx.rect(brickX, brickY, brickWidth, brickHeight);
            ctx.fillStyle = bricks[c][r].color;
            ctx.fill();
            ctx.closePath();
          }
        }
      }
    }

    function drawScore() {
      document.getElementById("score").textContent = "Punts: " + score;
    }

    function drawLives() {
      const livesDiv = document.getElementById("lives");
      livesDiv.innerHTML = "";
      for (let i = 0; i < lives; i++) {
        const span = document.createElement("span");
        livesDiv.appendChild(span);
      }
    }

    function resetBallAndPaddle() {
      x = canvas.width / 2;
      y = canvas.height - 30;
      dx = 3 * (Math.random() > 0.5 ? 1 : -1);
      dy = -3;
      paddleX = (canvas.width - paddleWidth) / 2;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBricks();
      drawBall();
      drawPaddle();
      collisionDetection();
      drawScore();
      drawLives();

      // Xocs laterals
      if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
        dx = -dx;
      }
      // Xoc amb el sostre
      if (y + dy < ballRadius) {
        dy = -dy;
      } else if (y + dy > canvas.height - ballRadius - paddleHeight - 5) {
        // Comprovem si toca la plataforma
        if (x > paddleX && x < paddleX + paddleWidth) {
          // Rebot amb una mica d’efecte segons on toqui
          const hitPos = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
          dx = 4 * hitPos;
          dy = -Math.abs(dy);
        } else if (y + dy > canvas.height - ballRadius) {
          // Perdem vida
          lives--;
          if (!lives) {
            alert("Has perdut 😢");
            document.location.reload();
          } else {
            resetBallAndPaddle();
          }
        }
      }

      // Mou la plataforma
      if (rightPressed && paddleX < canvas.width - paddleWidth) {
        paddleX += 6;
      } else if (leftPressed && paddleX > 0) {
        paddleX -= 6;
      }

      x += dx;
      y += dy;

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
