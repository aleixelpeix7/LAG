<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: monospace;
        overflow: hidden;
    }

    /* SPLASH */
    #splash {
        position: fixed;
        inset: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        overflow: hidden;
    }

    #logo {
        width: 420px; /* MÉS GROS */
        opacity: 0;
        animation: fadeIn 1.2s forwards;
        filter: drop-shadow(0 0 20px #0ff);
    }

    /* GLITCH LAYERS */
    .glitch {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 420px;
        transform: translate(-50%, -50%);
        opacity: 0;
        mix-blend-mode: screen;
    }

    .glitch.red { filter: drop-shadow(-5px 0 red); }
    .glitch.green { filter: drop-shadow(5px 0 lime); }
    .glitch.blue { filter: drop-shadow(0 5px cyan); }

    /* SCANLINES */
    #scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 2px,
            transparent 2px,
            transparent 4px
        );
        opacity: 0;
        pointer-events: none;
    }

    /* MAIN CONTENT */
    #main {
        display: none;
        padding: 40px;
        animation: fadeInMain 0.6s forwards;
    }

    /* ANIMACIONS */
    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes fadeInMain {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes glitchShake {
        0% { transform: translate(-50%, -50%) translate(0,0); }
        20% { transform: translate(-50%, -50%) translate(-10px, 5px); }
        40% { transform: translate(-50%, -50%) translate(10px, -5px); }
        60% { transform: translate(-50%, -50%) translate(-5px, -10px); }
        80% { transform: translate(-50%, -50%) translate(5px, 10px); }
        100% { transform: translate(-50%, -50%) translate(0,0); }
    }

    @keyframes noiseFlash {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.4; }
    }
</style>
</head>

<body>

<div id="splash">
    <img id="logo" src="assets/logo.png">

    <!-- Capes RGB per glitch -->
    <img class="glitch red" src="assets/logo.png">
    <img class="glitch green" src="assets/logo.png">
    <img class="glitch blue" src="assets/logo.png">

    <div id="scanlines"></div>
</div>

<div id="main">
    <h1>Benvingut a LAG</h1>
    <p>Aquí comença la web.</p>
</div>

<script>
const splash = document.getElementById("splash");
const main = document.getElementById("main");
const glitchLayers = document.querySelectorAll(".glitch");
const scanlines = document.getElementById("scanlines");

setTimeout(() => {
    // Activa glitch RGB
    glitchLayers.forEach(layer => {
        layer.style.opacity = "1";
        layer.style.animation = "glitchShake 0.15s infinite";
    });

    // Activa scanlines
    scanlines.style.opacity = "1";
    scanlines.style.animation = "noiseFlash 0.1s infinite";

    // Desapareix splash
    setTimeout(() => {
        splash.style.transition = "opacity 0.5s";
        splash.style.opacity = "0";

        setTimeout(() => {
            splash.remove();
            main.style.display = "block";
        }, 500);

    }, 700); // Duració del glitch

}, 1500); // Fade-in + pausa
</script>

</body>
</html>
