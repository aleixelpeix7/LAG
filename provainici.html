<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG - Inici</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* SPLASH */
    #splash {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }

    #logo {
        width: 260px;
        opacity: 0;
        animation: fadeIn 1.5s forwards;
    }

    /* Glitch layer */
    #glitch-layer {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 2px,
            transparent 2px,
            transparent 4px
        );
        opacity: 0;
        pointer-events: none;
    }

    /* MAIN CONTENT */
    #main-content {
        display: none;
        padding: 40px;
    }

    /* Animacions */
    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes glitch {
        0% { transform: translate(0,0); opacity: 1; }
        20% { transform: translate(-10px, 5px); opacity: 0.8; }
        40% { transform: translate(10px, -5px); opacity: 0.6; }
        60% { transform: translate(-5px, 10px); opacity: 0.8; }
        80% { transform: translate(5px, -10px); opacity: 0.7; }
        100% { transform: translate(0,0); opacity: 1; }
    }
</style>
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="assets/logo.png" id="logo" alt="LAG Logo">
        <div id="glitch-layer"></div>
    </div>

    <!-- Contingut principal -->
    <div id="main-content">
        <h1>Benvingut a LAG</h1>
        <p>Aquí comença la teva web.</p>
    </div>

<script>
    const splash = document.getElementById("splash");
    const glitchLayer = document.getElementById("glitch-layer");
    const main = document.getElementById("main-content");
    const logo = document.getElementById("logo");

    setTimeout(() => {
        // Activa l'efecte glitch
        glitchLayer.style.opacity = "1";
        glitchLayer.style.animation = "glitch 0.25s infinite";
        logo.style.animation = "glitch 0.25s infinite";

        // Després de 0.8s, treu el splash
        setTimeout(() => {
            splash.style.transition = "opacity 0.5s";
            splash.style.opacity = "0";

            setTimeout(() => {
                splash.style.display = "none";
                main.style.display = "block";
                document.body.style.overflow = "auto";
            }, 500);

        }, 800);

    }, 1500); // 1.5s per fer el fade-in + 1s de pausa
</script>

</body>
</html>
