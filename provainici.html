<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LAG — Splash realista</title>
<style>
  :root{ --bg:#002244; --fg:#cfe7ff; }
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:monospace;
    overflow:hidden;
  }

  /* SPLASH */
  #splash{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:900;
    overflow:hidden;
    will-change:transform,filter;
  }

  /* Logo (sense glow) */
  #logo{
    width:720px;
    max-width:88vw;
    opacity:0;
    animation:logoFadeIn 1s forwards;
    -webkit-user-drag:none;
    user-select:none;
    display:block;
    z-index:880;
  }
  @keyframes logoFadeIn{ to{opacity:1} }

  /* Canvas overlay per glitch (cobreix tota la pantalla) */
  #glitchCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:995;
    mix-blend-mode:screen;
    opacity:0;
    transition:opacity 120ms linear;
  }

  /* capes RGB per logo (subtil) */
  .glayer{
    position:absolute;
    top:50%;
    left:50%;
    width:720px;
    max-width:88vw;
    transform:translate(-50%,-50%);
    opacity:0;
    mix-blend-mode:screen;
    pointer-events:none;
    z-index:885;
  }

  /* scanlines de suport */
  #scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
    opacity:0;
    pointer-events:none;
    z-index:894;
    transition:opacity 80ms linear;
  }

  /* CRT OFF: dues barres (top/bottom) que es mouen cap al centre */
  #crt-off{
    position:fixed;
    inset:0;
    background:black;
    z-index:1000;
    display:none;
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }
  .crt-bar{
    position:absolute;
    left:0;
    width:100%;
    height:18vh;
    background:linear-gradient(90deg,#00bfff,#7fdfff);
    box-shadow:0 0 40px rgba(0,191,255,0.12) inset;
    transform-origin:center;
    z-index:1001;
  }
  #crt-top{ top:-25vh; }
  #crt-bottom{ bottom:-25vh; }

  /* MAIN (fade-in final) */
  #main{
    padding:40px;
    opacity:0;
    display:none;
    transition:opacity 2.2s cubic-bezier(.22,.9,.3,1);
    min-height:100vh;
    box-sizing:border-box;
    background:var(--bg);
    z-index:1;
  }
  #main h1{margin:0 0 12px 0;font-size:clamp(28px,4vw,48px)}
  #main p{margin:0;color:#cfe7ff}
</style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" aria-hidden="false">
    <img id="logo" src="assets/logo.png" alt="LAG logo">
    <img class="glayer" id="gR" src="assets/logo.png" alt="">
    <img class="glayer" id="gG" src="assets/logo.png" alt="">
    <img class="glayer" id="gB" src="assets/logo.png" alt="">
    <canvas id="glitchCanvas" aria-hidden="true"></canvas>
    <div id="scanlines" aria-hidden="true"></div>
  </div>

  <!-- CRT OFF -->
  <div id="crt-off" aria-hidden="true">
    <div id="crt-top" class="crt-bar" aria-hidden="true"></div>
    <div id="crt-bottom" class="crt-bar" aria-hidden="true"></div>
  </div>

  <!-- CONTINGUT PRINCIPAL -->
  <div id="main" aria-hidden="true">
    <h1>Benvingut a LAG</h1>
    <p>Aquí comença la web.</p>
  </div>

<script>
/* Paràmetres */
const initialDelay = 1000;   // espera inicial (logo fade-in)
const glitchDuration = 2000; // durada total del glitch abans del CRT
const blackPause = 500;      // temps en negre després CRT (ms)
const grainDensity = 0.00014;

/* Elements */
const splash = document.getElementById('splash');
const logo = document.getElementById('logo');
const gR = document.getElementById('gR');
const gG = document.getElementById('gG');
const gB = document.getElementById('gB');
const canvas = document.getElementById('glitchCanvas');
const scanlines = document.getElementById('scanlines');
const crtOff = document.getElementById('crt-off');
const crtTop = document.getElementById('crt-top');
const crtBottom = document.getElementById('crt-bottom');
const main = document.getElementById('main');

let ctx, W, H;
let running = false;
let timers = [];

/* utilitats */
const rand = (a,b)=> a + Math.random()*(b-a);
const rint = (a,b)=> Math.floor(rand(a,b));

/* canvas setup */
function setupCanvas(){
  const dpr = devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  W = window.innerWidth;
  H = window.innerHeight;
}

/* pinta franges horitzontals de colors, smear i grain (sense quadrats) */
function paintGlitch(intensity=1){
  if(!ctx) return;
  ctx.clearRect(0,0,W,H);

  // grain
  const grainCount = Math.floor(W * H * grainDensity * intensity);
  for(let i=0;i<grainCount;i++){
    const x = Math.random()*W;
    const y = Math.random()*H;
    const a = Math.random()*0.12*intensity;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(x,y,1,1);
  }

  // bands horitzontals de colors (com la foto)
  const bands = rint(6, 20);
  for(let i=0;i<bands;i++){
    const bandH = rint(4, 36) * (1 + Math.random()*0.6);
    const y = Math.random()*(H - bandH);
    const cols = [
      `rgba(255,40,40,${0.12 + Math.random()*0.25*intensity})`,
      `rgba(255,220,40,${0.08 + Math.random()*0.2*intensity})`,
      `rgba(40,255,180,${0.08 + Math.random()*0.2*intensity})`,
      `rgba(120,80,255,${0.06 + Math.random()*0.18*intensity})`,
      `rgba(255,80,200,${0.06 + Math.random()*0.18*intensity})`
    ];
    const col = cols[rint(0, cols.length-1)];
    const g = ctx.createLinearGradient(0, y, W, y + bandH);
    g.addColorStop(0, col);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, bandH);

    // smear horitzontal suau per evitar píxels quadrats
    const smear = rint(-40, 40) * intensity;
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(255,255,255,${0.01 * intensity})`;
    ctx.fillRect(Math.max(0, smear), y, Math.abs(smear), bandH);
    ctx.globalCompositeOperation = 'source-over';
  }

  // petites taques de color suaus (no quadrats)
  if(Math.random() > 0.6){
    const wRect = rint(40, W*0.45);
    const hRect = rint(20, H*0.22);
    const xRect = Math.random()*(W - wRect);
    const yRect = Math.random()*(H - hRect);
    ctx.fillStyle = `rgba(${rint(60,255)},${rint(60,255)},${rint(60,255)},${0.02 + Math.random()*0.06*intensity})`;
    ctx.fillRect(xRect, yRect, wRect, hRect);
  }
}

/* distorsió global suau (tota la splash) */
function applyGlobalDistortion(intensity=1){
  const tx = (Math.random()-0.5) * (4 + Math.random()*28) * intensity;
  const ty = (Math.random()-0.5) * (3 + Math.random()*18) * intensity;
  const rot = (Math.random()-0.5) * 0.5 * intensity;
  splash.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
  const blur = Math.random() > 0.75 ? (0.2 + Math.random()*1.0) * intensity : 0;
  const hue = (Math.random()-0.5) * 18 * intensity;
  document.body.style.filter = `hue-rotate(${hue}deg) blur(${blur}px)`;
}

/* reset */
function resetGlobal(){
  splash.style.transform = '';
  document.body.style.filter = '';
  [gR,gG,gB].forEach(g=>{
    g.style.transform = 'translate(-50%,-50%)';
    g.style.opacity = 0;
    g.style.clipPath = 'inset(0 0 0 0)';
  });
}

/* RGB split suau per logo */
function applyRgbLogo(intensity=1){
  const rxR = (Math.random()-0.5) * (4 + Math.random()*28) * -1 * intensity;
  const rxG = (Math.random()-0.5) * (4 + Math.random()*28) * 1 * intensity;
  const rxB = (Math.random()-0.5) * (2 + Math.random()*12) * 0.4 * intensity;
  const ry = (Math.random()-0.5) * (1 + Math.random()*8) * intensity;
  gR.style.transform = `translate(-50%,-50%) translate(${rxR}px, ${ry}px)`;
  gG.style.transform = `translate(-50%,-50%) translate(${rxG}px, ${ry}px)`;
  gB.style.transform = `translate(-50%,-50%) translate(${rxB}px, ${ry}px)`;
  gR.style.opacity = 0.55 * intensity;
  gG.style.opacity = 0.55 * intensity;
  gB.style.opacity = 0.4 * intensity;
  // clip suau per donar sensació de franja al logo
  const logoH = Math.max(logo.getBoundingClientRect().height, 200);
  const top = rint(0, logoH*0.6);
  const height = rint(6, logoH*0.45);
  const bottom = Math.max(0, logoH - (top + height));
  [gR,gG,gB].forEach(g => g.style.clipPath = `inset(${top}px 0px ${bottom}px 0px)`);
}

/* un burst de glitch */
function glitchBurst(intensity=1){
  canvas.style.opacity = 1;
  paintGlitch(0.6 + Math.random()*0.9 * intensity);
  applyGlobalDistortion(0.6 + Math.random()*1.2 * intensity);
  applyRgbLogo(0.6 + Math.random()*1.0 * intensity);
  scanlines.style.opacity = 0.06 + Math.random()*0.4 * intensity;

  const dur = rint(60, 260);
  const t = setTimeout(()=>{
    canvas.style.opacity = 0;
    scanlines.style.opacity = 0;
    resetGlobal();
  }, dur);
  timers.push(t);
}

/* loop imprevisible */
function startGlitchLoop(totalDuration=1600){
  if(running) return;
  running = true;
  const end = performance.now() + totalDuration;
  function step(){
    if(!running) return;
    const group = rint(1,4);
    for(let i=0;i<group;i++){
      setTimeout(()=> glitchBurst(0.7 + Math.random()*1.3), rint(0, 180));
    }
    const next = rint(40, 260);
    if(performance.now() < end){
      timers.push(setTimeout(step, next));
    } else {
      setTimeout(()=> glitchBurst(1.4), 40);
      setTimeout(()=> stopGlitchSmooth(), 320);
    }
  }
  step();
}

/* atura i neteja */
function stopGlitchSmooth(){
  running = false;
  timers.forEach(t=>clearTimeout(t));
  timers = [];
  canvas.style.opacity = 0;
  scanlines.style.opacity = 0;
  resetGlobal();
}

/* CRT realista: top/bottom venen de fora i es troben al centre, es contrauen a línia */
function playCrtAndReveal(){
  crtOff.style.display = 'block';
  // posicions inicials fora de pantalla
  crtTop.style.transition = 'transform 520ms cubic-bezier(.2,.9,.2,1), height 220ms ease';
  crtBottom.style.transition = 'transform 520ms cubic-bezier(.2,.9,.2,1), height 220ms ease';
  crtTop.style.transform = 'translateY(-120vh)';
  crtBottom.style.transform = 'translateY(120vh)';

  // animem cap al centre (no apareixen directament al centre)
  requestAnimationFrame(()=>{
    crtTop.style.transform = 'translateY(0)';
    crtBottom.style.transform = 'translateY(0)';
  });

  // quan arribin, expandim i després contraiem a línia fina
  setTimeout(()=>{
    crtTop.style.height = '50vh';
    crtBottom.style.height = '50vh';
    setTimeout(()=>{
      crtTop.style.height = '3px';
      crtBottom.style.height = '3px';
    }, 220);
  }, 520);

  // després de la contracció, mantenim negre i revelem main
  setTimeout(()=>{
    setTimeout(()=>{
      crtOff.style.display = 'none';
      main.style.display = 'block';
      requestAnimationFrame(()=>{
        main.style.opacity = '1';
        document.body.style.overflow = 'auto';
        main.removeAttribute('aria-hidden');
        splash.setAttribute('aria-hidden','true');
      });
    }, blackPause);
  }, 520 + 220 + 60);
}

/* resize */
function resizeAll(){
  setupCanvas();
  paintGlitch(0.2);
  const lw = logo.getBoundingClientRect().width;
  [gR,gG,gB].forEach(g => g.style.width = lw + 'px');
}
window.addEventListener('resize', resizeAll);
resizeAll();

/* flux principal */
setTimeout(()=>{
  startGlitchLoop(glitchDuration);
  scanlines.style.opacity = 0.05;

  setTimeout(()=>{
    stopGlitchSmooth();
    setTimeout(()=>{
      splash.style.display = 'none';
      playCrtAndReveal();
    }, 90);
  }, glitchDuration);

}, initialDelay);

/* neteja */
window.addEventListener('beforeunload', ()=> stopGlitchSmooth());
</script>
</body>
</html>
