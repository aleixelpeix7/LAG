<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LAG - Splash realista</title>
<style>
  :root{ --bg:#002244; --fg:#cfe7ff; }
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:monospace;
    overflow:hidden;
  }

  /* SPLASH */
  #splash{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:900;
    overflow:hidden;
    will-change: transform, filter;
  }

  /* Logo (sense glow) */
  #logo{
    width:720px;
    max-width:88vw;
    opacity:0;
    animation:logoFadeIn 1.0s forwards;
    -webkit-user-drag:none;
    user-select:none;
    display:block;
    z-index:880;
  }
  @keyframes logoFadeIn{ to{opacity:1} }

  /* Canvas que cobreix tota la pantalla per pintar el glitch (franges, soroll, color bleed) */
  #glitchCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:895;
    mix-blend-mode:screen;
    opacity:0;
    transition:opacity 120ms linear;
  }

  /* capes RGB per fer split subtil del logo (només per profunditat) */
  .glayer{
    position:absolute;
    top:50%;
    left:50%;
    width:720px;
    max-width:88vw;
    transform:translate(-50%,-50%);
    opacity:0;
    mix-blend-mode:screen;
    pointer-events:none;
    z-index:885;
  }

  /* scanlines i bars visuals (suport) */
  #scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
    opacity:0;
    pointer-events:none;
    z-index:894;
    transition:opacity 80ms linear;
  }

  /* CRT OFF: dues barres (top/bottom) que es mouen cap al centre */
  #crt-off{
    position:fixed;
    inset:0;
    background:black;
    z-index:1000;
    display:none;
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }
  .crt-bar{
    position:absolute;
    left:0;
    width:100%;
    height:18vh; /* mida inicial de la barra (visible quan entra) */
    background:linear-gradient(90deg,#00bfff,#7fdfff);
    box-shadow:0 0 40px rgba(0,191,255,0.12) inset;
    transform-origin:center;
    z-index:1001;
  }
  #crt-top{ top:-25vh; }      /* comença fora de la pantalla, per sobre */
  #crt-bottom{ bottom:-25vh; }/* comença fora de la pantalla, per sota */

  /* MAIN (fade-in final) */
  #main{
    padding:40px;
    opacity:0;
    display:none;
    transition:opacity 2.2s cubic-bezier(.22,.9,.3,1);
    min-height:100vh;
    box-sizing:border-box;
    background:var(--bg);
    z-index:1;
  }
  #main h1{margin:0 0 12px 0;font-size:clamp(28px,4vw,48px)}
  #main p{margin:0;color:#cfe7ff}
</style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" aria-hidden="false">
    <img id="logo" src="assets/logo.png" alt="LAG logo">
    <img class="glayer" id="gR" src="assets/logo.png" alt="">
    <img class="glayer" id="gG" src="assets/logo.png" alt="">
    <img class="glayer" id="gB" src="assets/logo.png" alt="">
    <canvas id="glitchCanvas" aria-hidden="true"></canvas>
    <div id="scanlines" aria-hidden="true"></div>
  </div>

  <!-- CRT OFF (dues barres que venen de dalt i baix) -->
  <div id="crt-off" aria-hidden="true">
    <div id="crt-top" class="crt-bar" aria-hidden="true"></div>
    <div id="crt-bottom" class="crt-bar" aria-hidden="true"></div>
  </div>

  <!-- CONTINGUT PRINCIPAL -->
  <div id="main" aria-hidden="true">
    <h1>Benvingut a LAG</h1>
    <p>Aquí comença la web.</p>
  </div>

<script>
/* Paràmetres ajustables */
const initialDelay = 1000;   // espera inicial (logo fade-in)
const glitchDuration = 1800; // durada total del glitch abans del CRT
const blackPause = 500;      // temps en negre després CRT (ms)
const grainDensity = 0.00012; // intensitat del grain

/* Elements */
const splash = document.getElementById('splash');
const logo = document.getElementById('logo');
const gR = document.getElementById('gR');
const gG = document.getElementById('gG');
const gB = document.getElementById('gB');
const glitchCanvas = document.getElementById('glitchCanvas');
const scanlines = document.getElementById('scanlines');
const crtOff = document.getElementById('crt-off');
const crtTop = document.getElementById('crt-top');
const crtBottom = document.getElementById('crt-bottom');
const main = document.getElementById('main');

let ctx, w, h;
let running = false;
let timers = [];

/* utilitats */
const rand = (a,b)=> a + Math.random()*(b-a);
const rint = (a,b)=> Math.floor(rand(a,b));

/* Setup canvas */
function setupCanvas(){
  const dpr = devicePixelRatio || 1;
  glitchCanvas.width = window.innerWidth * dpr;
  glitchCanvas.height = window.innerHeight * dpr;
  glitchCanvas.style.width = window.innerWidth + 'px';
  glitchCanvas.style.height = window.innerHeight + 'px';
  ctx = glitchCanvas.getContext('2d');
  ctx.scale(dpr, dpr);
  w = window.innerWidth;
  h = window.innerHeight;
}

/* Pintar franges horitzontals de colors + grain + subtle smear */
function paintGlitch(intensity=1){
  if(!ctx) return;
  ctx.clearRect(0,0,w,h);

  // grain
  const grainCount = Math.floor(w * h * grainDensity * intensity);
  for(let i=0;i<grainCount;i++){
    const x = Math.random()*w;
    const y = Math.random()*h;
    const a = Math.random()*0.12*intensity;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(x,y,1,1);
  }

  // franges de colors (horitzontals) — imiten la foto
  const bands = rint(6, 18);
  for(let i=0;i<bands;i++){
    const bandH = rint(4, 36) * (1 + Math.random()*0.6);
    const y = Math.random()*(h - bandH);
    // colors variats similars a la foto
    const cols = [
      `rgba(255,40,40,${0.12 + Math.random()*0.25*intensity})`,
      `rgba(255,220,40,${0.08 + Math.random()*0.2*intensity})`,
      `rgba(40,255,180,${0.08 + Math.random()*0.2*intensity})`,
      `rgba(120,80,255,${0.06 + Math.random()*0.18*intensity})`,
      `rgba(255,80,200,${0.06 + Math.random()*0.18*intensity})`
    ];
    const col = cols[rint(0, cols.length-1)];
    // dibuixa franja amb gradient suau per evitar quadrats
    const g = ctx.createLinearGradient(0, y, w, y + bandH);
    g.addColorStop(0, col);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, y, w, bandH);
    // afegeix una mica de desplaçament de píxels horitzontal (smear)
    const smear = rint(-40, 40) * intensity;
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(255,255,255,${0.01 * intensity})`;
    ctx.fillRect(Math.max(0, smear), y, Math.abs(smear), bandH);
    ctx.globalCompositeOperation = 'source-over';
  }

  // subtle color bleed rectangles (no quadrats grans)
  if(Math.random() > 0.6){
    const wRect = rint(40, w*0.5);
    const hRect = rint(20, h*0.25);
    const xRect = Math.random()*(w - wRect);
    const yRect = Math.random()*(h - hRect);
    ctx.fillStyle = `rgba(${rint(60,255)},${rint(60,255)},${rint(60,255)},${0.02 + Math.random()*0.06*intensity})`;
    ctx.fillRect(xRect, yRect, wRect, hRect);
  }
}

/* Aplica un moviment global suau a tota la splash per simular distorsió */
function applyGlobalDistortion(intensity=1){
  const tx = (Math.random()-0.5) * (6 + Math.random()*40) * intensity;
  const ty = (Math.random()-0.5) * (4 + Math.random()*24) * intensity;
  const rot = (Math.random()-0.5) * 0.6 * intensity;
  splash.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
  // lleu blur i hue per sensació de distorsió
  const blur = Math.random() > 0.7 ? (0.3 + Math.random()*1.2) * intensity : 0;
  const hue = (Math.random()-0.5) * 20 * intensity;
  document.body.style.filter = `hue-rotate(${hue}deg) blur(${blur}px)`;
}

/* neteja transformacions */
function resetGlobal(){
  splash.style.transform = '';
  document.body.style.filter = '';
  gR.style.transform = gG.style.transform = gB.style.transform = 'translate(-50%,-50%)';
  gR.style.opacity = gG.style.opacity = gB.style.opacity = 0;
}

/* RGB split suau sobre el logo per donar sensació de color bleed */
function applyRgbLogo(intensity=1){
  const rxR = (Math.random()-0.5) * (6 + Math.random()*40) * -1 * intensity;
  const rxG = (Math.random()-0.5) * (6 + Math.random()*40) * 1 * intensity;
  const rxB = (Math.random()-0.5) * (3 + Math.random()*20) * 0.4 * intensity;
  const ry = (Math.random()-0.5) * (2 + Math.random()*12) * intensity;
  gR.style.transform = `translate(-50%,-50%) translate(${rxR}px, ${ry}px)`;
  gG.style.transform = `translate(-50%,-50%) translate(${rxG}px, ${ry}px)`;
  gB.style.transform = `translate(-50%,-50%) translate(${rxB}px, ${ry}px)`;
  gR.style.opacity = 0.6 * intensity;
  gG.style.opacity = 0.6 * intensity;
  gB.style.opacity = 0.45 * intensity;
}

/* Un sol "burst" de glitch: pinta canvas + distorsió global + rgb logo */
function glitchBurst(intensity=1){
  glitchCanvas.style.opacity = 1;
  paintGlitch(0.6 + Math.random()*0.9 * intensity);
  applyGlobalDistortion(0.6 + Math.random()*1.2 * intensity);
  applyRgbLogo(0.6 + Math.random()*1.0 * intensity);
  scanlines.style.opacity = 0.08 + Math.random()*0.35 * intensity;

  // durada curta i després suavitzar
  const dur = rint(60, 260);
  const t = setTimeout(()=>{
    glitchCanvas.style.opacity = 0;
    scanlines.style.opacity = 0;
    resetGlobal();
  }, dur);
  timers.push(t);
}

/* Loop imprevisible de bursts (no periòdic) */
function startGlitchLoop(totalDuration=1600){
  if(running) return;
  running = true;
  const end = performance.now() + totalDuration;
  function step(){
    if(!running) return;
    const group = rint(1,4);
    for(let i=0;i<group;i++){
      setTimeout(()=> glitchBurst(0.6 + Math.random()*1.2), rint(0, 180));
    }
    const next = rint(40, 260);
    if(performance.now() < end){
      timers.push(setTimeout(step, next));
    } else {
      // últim burst fort i després neteja
      setTimeout(()=> glitchBurst(1.4), 40);
      setTimeout(()=> stopGlitchSmooth(), 320);
    }
  }
  step();
}

/* Atura i neteja */
function stopGlitchSmooth(){
  running = false;
  timers.forEach(t=>clearTimeout(t));
  timers = [];
  glitchCanvas.style.opacity = 0;
  scanlines.style.opacity = 0;
  resetGlobal();
}

/* CRT final realista: top i bottom venen de fora i es troben al centre */
function playCrtAndReveal(){
  crtOff.style.display = 'block';
  // assegura posicions inicials fora de pantalla
  crtTop.style.transition = 'transform 520ms cubic-bezier(.2,.9,.2,1), height 220ms ease';
  crtBottom.style.transition = 'transform 520ms cubic-bezier(.2,.9,.2,1), height 220ms ease';
  // posicions inicials (fora)
  crtTop.style.transform = 'translateY(-120vh)';    // des de dalt cap avall
  crtBottom.style.transform = 'translateY(120vh)';  // des de baix cap amunt

  // forcem repaint i després animem cap al centre (no apareixen directament al centre)
  requestAnimationFrame(()=>{
    // mourem les barres a la posició central (les transformem a 0)
    crtTop.style.transform = 'translateY(0)';    // entra cap al centre
    crtBottom.style.transform = 'translateY(0)';
  });

  // quan arribin (aprox 520ms), fem que s'ajustin i es contraguin a una línia fina
  setTimeout(()=>{
    // expandim lleugerament per simular "impacte" i després contraiem
    crtTop.style.height = '50vh';
    crtBottom.style.height = '50vh';
    // després contraiem ràpid a línia fina al centre
    setTimeout(()=>{
      crtTop.style.height = '3px';
      crtBottom.style.height = '3px';
      // centrem exactament (ja ho estan)
    }, 220);
  }, 520);

  // després de la contracció, mantenim negre i revelem main
  setTimeout(()=>{
    // mantenim negre blackPause ms
    setTimeout(()=>{
      crtOff.style.display = 'none';
      main.style.display = 'block';
      requestAnimationFrame(()=>{
        main.style.opacity = '1';
        document.body.style.overflow = 'auto';
        main.removeAttribute('aria-hidden');
        splash.setAttribute('aria-hidden','true');
      });
    }, blackPause);
  }, 520 + 220 + 60); // sincronització: entrada + expand + petita pausa
}

/* Resize */
function resizeAll(){
  setupCanvas();
  paintGlitch(0.2);
  // ajustem capes logo
  const lw = logo.getBoundingClientRect().width;
  [gR,gG,gB].forEach(g => g.style.width = lw + 'px');
}
window.addEventListener('resize', resizeAll);
resizeAll();

/* Flux principal */
setTimeout(()=>{
  // arrenca loop imprevisible
  startGlitchLoop(glitchDuration);
  // fer visibles scanlines lleugerament
  scanlines.style.opacity = 0.05;

  // atura i CRT després de glitchDuration
  setTimeout(()=>{
    stopGlitchSmooth();
    setTimeout(()=>{
      splash.style.display = 'none';
      playCrtAndReveal();
    }, 90);
  }, glitchDuration);

}, initialDelay);

/* neteja */
window.addEventListener('beforeunload', ()=> stopGlitchSmooth());
</script>
</body>
</html>
