<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
    body {
        margin: 0;
        background: #002244;
        color: white;
        font-family: monospace;
        overflow: hidden;
    }

    /* SPLASH */
    #splash {
        position: fixed;
        inset: 0;
        background: #002244;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 900;
        overflow: hidden;
    }

    #logo {
        width: 600px;
        opacity: 0;
        animation: fadeIn 1.2s forwards;
        filter: none;
    }

    .glitch {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 600px;
        transform: translate(-50%, -50%);
        opacity: 0;
        mix-blend-mode: screen;
    }

    .glitch.r { filter: drop-shadow(-20px 0 red); }
    .glitch.g { filter: drop-shadow(20px 0 lime); }
    .glitch.b { filter: drop-shadow(0 20px cyan); }

    #bars {
        position: absolute;
        inset: 0;
        opacity: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,0,0,0.25) 0px,
            rgba(255,0,0,0.25) 8px,
            rgba(0,255,255,0.2) 8px,
            rgba(0,255,255,0.2) 16px,
            rgba(255,255,0,0.2) 16px,
            rgba(255,255,0,0.2) 24px,
            transparent 24px,
            transparent 32px
        );
        pointer-events: none;
    }

    #scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 2px,
            transparent 2px,
            transparent 4px
        );
        opacity: 0;
        pointer-events: none;
    }

    /* CAPA CRT OFF (fons negre + línia) */
    #crt-off {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 1000;
        display: none;
        justify-content: center;
        align-items: center;
    }

    #crt-line {
        width: 100%;
        height: 4px;          /* línia prima */
        background: #ffffff;
        transform-origin: center;
        animation: crtLine 0.7s forwards;
    }

    /* MAIN */
    #main {
        padding: 40px;
        opacity: 0;
        display: none;
        transition: opacity 2.2s ease;
    }

    /* ANIMACIONS */
    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes glitchShake {
        0% { transform: translate(-50%, -50%) translate(0,0); }
        20% { transform: translate(-50%, -50%) translate(-35px, 15px); }
        40% { transform: translate(-50%, -50%) translate(35px, -15px); }
        60% { transform: translate(-50%, -50%) translate(-25px, -30px); }
        80% { transform: translate(-50%, -50%) translate(25px, 30px); }
        100% { transform: translate(-50%, -50%) translate(0,0); }
    }

    @keyframes noiseFlash {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.6; }
    }

    /* línia que es tanca al centre (ja comença prima) */
    @keyframes crtLine {
        0%   { transform: scaleY(1); }
        100% { transform: scaleY(0); }
    }
</style>
</head>

<body>

<div id="splash">
    <img id="logo" src="assets/logo.png">
    <img class="glitch r" src="assets/logo.png">
    <img class="glitch g" src="assets/logo.png">
    <img class="glitch b" src="assets/logo.png">
    <div id="bars"></div>
    <div id="scanlines"></div>
</div>

<!-- Pantalla negra amb línia al mig -->
<div id="crt-off">
    <div id="crt-line"></div>
</div>

<div id="main">
    <h1>Benvingut a LAG</h1>
    <p>Aquí comença la web.</p>
</div>

<script>
const splash = document.getElementById("splash");
const main = document.getElementById("main");
const glitchLayers = document.querySelectorAll(".glitch");
const bars = document.getElementById("bars");
const scanlines = document.getElementById("scanlines");
const crtOff = document.getElementById("crt-off");
const crtLine = document.getElementById("crt-line");

setTimeout(() => {
    // Glitch
    glitchLayers.forEach(layer => {
        layer.style.opacity = "1";
        layer.style.animation = "glitchShake 0.1s infinite";
    });
    bars.style.opacity = "1";
    bars.style.animation = "noiseFlash 0.07s infinite";
    scanlines.style.opacity = "1";
    scanlines.style.animation = "noiseFlash 0.05s infinite";

    // Després del glitch, apaga pantalla
    setTimeout(() => {
        splash.style.display = "none";
        crtOff.style.display = "flex";

        crtLine.addEventListener("animationend", () => {
            // mig segon en negre
            setTimeout(() => {
                crtOff.style.display = "none";
                main.style.display = "block";
                requestAnimationFrame(() => {
                    main.style.opacity = "1"; // fade cap a l'inici
                });
            }, 500);
        }, { once: true });

    }, 1000); // duració del glitch

}, 1500); // fade-in + pausa inicial
</script>

</body>
</html>
