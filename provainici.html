<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
    body {
        margin: 0;
        background: #002244; /* COLOR QUE HAS DEMANAT */
        color: white;
        font-family: monospace;
        overflow: hidden;
    }

    /* SPLASH */
    #splash {
        position: fixed;
        inset: 0;
        background: #002244;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        overflow: hidden;
    }

    #logo {
        width: 600px; /* ENCARA MÉS GROS */
        opacity: 0;
        animation: fadeIn 1.2s forwards;
        filter: drop-shadow(0 0 30px #00eaff);
    }

    /* CAPES RGB */
    .glitch {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 600px;
        transform: translate(-50%, -50%);
        opacity: 0;
        mix-blend-mode: screen;
    }

    .glitch.r { filter: drop-shadow(-20px 0 red); }
    .glitch.g { filter: drop-shadow(20px 0 lime); }
    .glitch.b { filter: drop-shadow(0 20px cyan); }

    /* FRANGES DE COLORS TIPUS ERROR */
    #bars {
        position: absolute;
        inset: 0;
        opacity: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,0,0,0.25) 0px,
            rgba(255,0,0,0.25) 8px,
            rgba(0,255,255,0.2) 8px,
            rgba(0,255,255,0.2) 16px,
            rgba(255,255,0,0.2) 16px,
            rgba(255,255,0,0.2) 24px,
            transparent 24px,
            transparent 32px
        );
        pointer-events: none;
    }

    /* SCANLINES */
    #scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 2px,
            transparent 2px,
            transparent 4px
        );
        opacity: 0;
        pointer-events: none;
    }

    /* MAIN */
    #main {
        display: none;
        padding: 40px;
        animation: fadeInMain 0.6s forwards;
    }

    /* ANIMACIONS */
    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes fadeInMain {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes glitchShake {
        0% { transform: translate(-50%, -50%) translate(0,0); }
        20% { transform: translate(-50%, -50%) translate(-35px, 15px); }
        40% { transform: translate(-50%, -50%) translate(35px, -15px); }
        60% { transform: translate(-50%, -50%) translate(-25px, -30px); }
        80% { transform: translate(-50%, -50%) translate(25px, 30px); }
        100% { transform: translate(-50%, -50%) translate(0,0); }
    }

    @keyframes noiseFlash {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.6; }
    }
</style>
</head>

<body>

<div id="splash">
    <img id="logo" src="assets/logo.png">

    <!-- RGB glitch layers -->
    <img class="glitch r" src="assets/logo.png">
    <img class="glitch g" src="assets/logo.png">
    <img class="glitch b" src="assets/logo.png">

    <div id="bars"></div>
    <div id="scanlines"></div>
</div>

<div id="main">
    <h1>Benvingut a LAG</h1>
    <p>Aquí comença la web.</p>
</div>

<script>
const splash = document.getElementById("splash");
const main = document.getElementById("main");
const glitchLayers = document.querySelectorAll(".glitch");
const bars = document.getElementById("bars");
const scanlines = document.getElementById("scanlines");

setTimeout(() => {
    // Activa glitch RGB
    glitchLayers.forEach(layer => {
        layer.style.opacity = "1";
        layer.style.animation = "glitchShake 0.1s infinite";
    });

    // Franges de colors
    bars.style.opacity = "1";
    bars.style.animation = "noiseFlash 0.07s infinite";

    // Scanlines
    scanlines.style.opacity = "1";
    scanlines.style.animation = "noiseFlash 0.05s infinite";

    // Desapareix splash
    setTimeout(() => {
        splash.style.transition = "opacity 0.5s";
        splash.style.opacity = "0";

        setTimeout(() => {
            splash.remove();
            main.style.display = "block";
        }, 500);

    }, 1000); // Duració del glitch

}, 1500); // Fade-in + pausa
</script>

</body>
</html>
