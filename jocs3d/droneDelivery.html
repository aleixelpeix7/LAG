<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<title>Drone Delivery 3D - Cartoon City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body{margin:0;overflow:hidden;background:#87ceeb;font-family:system-ui;color:#fff}
  canvas#bg{position:fixed;inset:0;width:100%;height:100%;display:block}
  #hud{
    position:fixed;top:10px;left:10px;right:10px;
    display:flex;justify-content:space-between;
    font-size:16px;text-shadow:0 0 6px #000;z-index:10;
  }
  #hud span.box{
    background:rgba(0,0,0,.45);
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.25);
  }
  #help{
    position:fixed;top:42px;left:10px;
    font-size:13px;opacity:.95;text-shadow:0 0 4px #000;z-index:10;
  }
  #minimap{
    position:fixed;bottom:10px;left:10px;
    width:150px;height:150px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.9);
    background:rgba(0,0,0,.55);
    z-index:10;
  }
</style>
</head>
<body>

<div id="hud">
  <span class="box">Paquets: <span id="score">0</span></span>
  <span class="box">Distància: <span id="dist">0</span> m</span>
</div>
<div id="help">
  WASD / Fletxes = girar i avançar · Espai = pujar · Shift = baixar
</div>

<canvas id="bg"></canvas>
<canvas id="minimap"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const canvas = document.getElementById("bg");
const mapCanvas = document.getElementById("minimap");
const mapCtx = mapCanvas.getContext("2d");
const scoreEl = document.getElementById("score");
const distEl  = document.getElementById("dist");

// Renderer
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x87ceeb, 1);

// Escena i càmera
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 90, 280);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 600);
camera.position.set(0, 25, 50);

// Llums
const hemi = new THREE.HemisphereLight(0xffffff, 0x88c070, 0.95);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(80,100,60);
scene.add(sun);

// Terra
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x7ccf5b, roughness:0.9})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Carrers
const roads = new THREE.Group();
scene.add(roads);
(function createRoads(){
  const mat = new THREE.MeshStandardMaterial({color:0xe5e5e5, roughness:1});
  for(let i=-200;i<=200;i+=50){
    const r1 = new THREE.Mesh(new THREE.PlaneGeometry(500,10), mat);
    r1.rotation.x = -Math.PI/2;
    r1.position.z = i;
    roads.add(r1);
    const r2 = new THREE.Mesh(new THREE.PlaneGeometry(10,500), mat);
    r2.rotation.x = -Math.PI/2;
    r2.position.x = i;
    roads.add(r2);
  }
})();

// Edificis cartoon millorats
const buildings = new THREE.Group();
scene.add(buildings);
(function createBuildings(){
  const palette = [0xffb347,0xff6961,0x77dd77,0x84b6f4,0xfdfd96,0xcdb4db,0xffdac1];
  const rng = (a,b)=>a+Math.random()*(b-a);
  for(let gx=-200;gx<=200;gx+=50){
    for(let gz=-200;gz<=200;gz+=50){
      if(Math.abs(gx)<70 && Math.abs(gz)<70) continue; // zona base
      const count = 1+Math.floor(Math.random()*3);
      for(let i=0;i<count;i++){
        const w = rng(10,18);
        const d = rng(10,18);
        const h = rng(18,55);
        const geo = new THREE.BoxGeometry(w,h,d);
        const col = palette[Math.floor(Math.random()*palette.length)];
        const mat = new THREE.MeshStandardMaterial({color:col, roughness:0.85});
        const b = new THREE.Mesh(geo, mat);
        b.position.set(
          gx + rng(-12,12),
          h/2,
          gz + rng(-12,12)
        );
        // “finestres” falses amb una franja
        const stripeGeo = new THREE.BoxGeometry(w*0.95, h*0.12, d*1.01);
        const stripeMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffff, emissiveIntensity:0.15});
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.position.y = h*0.6;
        b.add(stripe);

        buildings.add(b);
      }
    }
  }
})();

// Base central
const base = new THREE.Group();
scene.add(base);
const basePad = new THREE.Mesh(
  new THREE.CylinderGeometry(12,12,1.2,32),
  new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.8})
);
basePad.position.y = 0.6;
base.add(basePad);
const baseRing = new THREE.Mesh(
  new THREE.TorusGeometry(9,0.5,14,48),
  new THREE.MeshStandardMaterial({color:0x3b82f6, emissive:0x3b82f6, emissiveIntensity:0.8})
);
baseRing.rotation.x = Math.PI/2;
baseRing.position.y = 1.4;
base.add(baseRing);

// Dron amb yaw i front clar
const drone = new THREE.Group();
scene.add(drone);
(function createDrone(){
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(3.2,1.1,3.2),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  body.position.y = 0.7;
  drone.add(body);

  const nose = new THREE.Mesh(
    new THREE.BoxGeometry(1.6,0.8,1.6),
    new THREE.MeshStandardMaterial({color:0x3b82f6})
  );
  nose.position.set(0,0.9,2.1);
  drone.add(nose);

  const eye = new THREE.Mesh(
    new THREE.BoxGeometry(0.8,0.4,0.2),
    new THREE.MeshStandardMaterial({color:0x000000, emissive:0x000000})
  );
  eye.position.set(0,0.9,2.9);
  drone.add(eye);

  const armMat = new THREE.MeshStandardMaterial({color:0xcccccc});
  const rotorMat = new THREE.MeshStandardMaterial({color:0x111111});
  drone.rotors = [];

  const armGeo = new THREE.BoxGeometry(4.2,0.25,0.45);
  const armFront = new THREE.Mesh(armGeo, armMat);
  armFront.position.set(0,1.1,1.7);
  drone.add(armFront);
  const armBack = new THREE.Mesh(armGeo, armMat);
  armBack.position.set(0,1.1,-1.7);
  drone.add(armBack);

  const rotorGeo = new THREE.CylinderGeometry(0.55,0.55,0.18,14);
  const positions = [
    [2.1,1.25,1.7],
    [-2.1,1.25,1.7],
    [2.1,1.25,-1.7],
    [-2.1,1.25,-1.7],
  ];
  positions.forEach(p=>{
    const r = new THREE.Mesh(rotorGeo, rotorMat);
    r.rotation.x = Math.PI/2;
    r.position.set(p[0],p[1],p[2]);
    drone.add(r);
    drone.rotors.push(r);
  });

  const pkg = new THREE.Mesh(
    new THREE.BoxGeometry(1.6,1.1,1.6),
    new THREE.MeshStandardMaterial({color:0xf97316})
  );
  pkg.position.y = -0.1;
  drone.add(pkg);

  drone.position.set(0,7,0);
})();

// Fletxa 3D cap al destí
const arrow = new THREE.Group();
scene.add(arrow);
(function createArrow(){
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.12,3.2,8),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  shaft.rotation.z = Math.PI/2;
  arrow.add(shaft);
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.5,1.1,12),
    new THREE.MeshBasicMaterial({color:0x22c55e})
  );
  head.position.x = 1.9;
  head.rotation.z = Math.PI/2;
  arrow.add(head);
})();

// Destí
const target = new THREE.Mesh(
  new THREE.CylinderGeometry(2.8,2.8,0.7,24),
  new THREE.MeshStandardMaterial({color:0x22c55e, emissive:0x16a34a, emissiveIntensity:0.8})
);
target.position.set(60,0.35,60);
scene.add(target);

const targetRing = new THREE.Mesh(
  new THREE.TorusGeometry(3.5,0.28,12,40),
  new THREE.MeshBasicMaterial({color:0x22c55e})
);
targetRing.rotation.x = Math.PI/2;
targetRing.position.copy(target.position).setY(0.7);
scene.add(targetRing);

// Controls
const keys = {};
window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup",   e=>keys[e.code]=false);

// Física del dron (yaw + velocitat alta)
let yaw = 0; // angle al voltant de Y
const vel = new THREE.Vector3();
const accelForward = 55;   // ràpid
const accelStrafe  = 35;
const accelVert    = 45;
const damping      = 0.90;
const maxSpeed     = 45;

let score = 0;

function resetTarget(){
  const r = 200;
  const a = Math.random()*Math.PI*2;
  const d = 60 + Math.random()*(r-60);
  const x = Math.cos(a)*d;
  const z = Math.sin(a)*d;
  target.position.set(x,0.35,z);
  targetRing.position.copy(target.position).setY(0.7);
}

function updateDrone(dt){
  // gir (yaw)
  const turnLeft  = keys["KeyA"] || keys["ArrowLeft"];
  const turnRight = keys["KeyD"] || keys["ArrowRight"];
  const turnSpeed = 2.8; // rad/s
  if(turnLeft)  yaw += turnSpeed*dt;
  if(turnRight) yaw -= turnSpeed*dt;

  // vector front i lateral segons yaw
  const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)*-1);
  const right   = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).negate();

  // avançar / retrocedir
  const goForward  = keys["KeyW"] || keys["ArrowUp"];
  const goBackward = keys["KeyS"] || keys["ArrowDown"];
  if(goForward)  vel.addScaledVector(forward, accelForward*dt);
  if(goBackward) vel.addScaledVector(forward, -accelForward*0.6*dt);

  // strafe opcional (Q/E)
  if(keys["KeyQ"]) vel.addScaledVector(right, -accelStrafe*dt);
  if(keys["KeyE"]) vel.addScaledVector(right,  accelStrafe*dt);

  // vertical
  if(keys["Space"])      vel.y += accelVert*dt;
  if(keys["ShiftLeft"] || keys["ShiftRight"]) vel.y -= accelVert*dt;

  // damping i límit
  vel.multiplyScalar(damping);
  vel.clampLength(0, maxSpeed);

  // aplicar moviment
  drone.position.addScaledVector(vel, dt);
  drone.position.y = Math.max(4, Math.min(70, drone.position.y));

  // aplicar rotació al dron
  drone.rotation.y = yaw;
  drone.rotation.z += (-vel.x*0.03 - drone.rotation.z)*0.18;
  drone.rotation.x += ( vel.z*0.03 - drone.rotation.x)*0.18;

  // hèlixs
  if(drone.rotors){
    drone.rotors.forEach(r=>r.rotation.y += 35*dt);
  }

  // càmera suau darrere del dron
  const camOffsetLocal = new THREE.Vector3(0, 18, -32);
  const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const camOffsetWorld = camOffsetLocal.clone().applyQuaternion(q);
  const desiredCamPos = drone.position.clone().add(camOffsetWorld);
  camera.position.lerp(desiredCamPos, 0.12);
  const lookAtPos = drone.position.clone().add(new THREE.Vector3(0,4,0));
  camera.lookAt(lookAtPos);

  // fletxa cap al destí
  arrow.position.copy(drone.position).setY(drone.position.y+6);
  arrow.lookAt(target.position.x, target.position.y+2, target.position.z);

  // distància i entrega
  const dist = drone.position.distanceTo(target.position);
  distEl.textContent = dist.toFixed(1);
  if(dist<5 && Math.abs(drone.position.y-4)<4){
    score++;
    scoreEl.textContent = score;
    resetTarget();
  }
}

// mini‑mapa rotatiu (el dron sempre mira amunt)
function drawMinimap(){
  const ctx = mapCtx;
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const r = w/2;
  ctx.clearRect(0,0,w,h);

  ctx.save();
  ctx.translate(r,r);

  // fons circular
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fill();

  // rotar mapa segons yaw (dron sempre amunt)
  ctx.rotate(-yaw);

  const scale = 0.25; // 500 -> 125

  // carrers
  ctx.strokeStyle = "rgba(230,230,230,0.7)";
  ctx.lineWidth = 2;
  for(let i=-200;i<=200;i+=50){
    ctx.beginPath();
    ctx.moveTo(-250*scale, i*scale);
    ctx.lineTo( 250*scale, i*scale);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(i*scale, -250*scale);
    ctx.lineTo(i*scale,  250*scale);
    ctx.stroke();
  }

  // base
  ctx.fillStyle = "#3b82f6";
  ctx.beginPath();
  ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fill();

  // destí
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(target.position.x*scale, target.position.z*scale, 6, 0, Math.PI*2);
  ctx.fill();

  // dron (triangle apuntant amunt)
  ctx.save();
  ctx.translate(drone.position.x*scale, drone.position.z*scale);
  ctx.rotate(yaw); // perquè després hem girat el mapa
  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.moveTo(0,-7);
  ctx.lineTo(5,5);
  ctx.lineTo(-5,5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// bucle
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;

  updateDrone(dt);
  targetRing.rotation.z += 0.9*dt;
  baseRing.rotation.z -= 0.5*dt;

  renderer.render(scene, camera);
  drawMinimap();
}
loop(performance.now());

window.addEventListener("resize", ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
