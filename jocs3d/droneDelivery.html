<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<title>Drone Delivery 3D - Low Poly Cartoon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body{margin:0;overflow:hidden;background:#87ceeb;font-family:system-ui;color:#fff}
  canvas#bg{position:fixed;inset:0;width:100%;height:100%;display:block}
  #hud{
    position:fixed;top:10px;left:10px;right:10px;
    display:flex;justify-content:space-between;
    font-size:16px;text-shadow:0 0 6px #000;z-index:10;
  }
  #hud span.box{
    background:rgba(0,0,0,.4);
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.2);
  }
  #help{
    position:fixed;top:40px;left:10px;
    font-size:13px;opacity:.9;text-shadow:0 0 4px #000;
    z-index:10;
  }
  #minimap{
    position:fixed;bottom:10px;left:10px;
    width:140px;height:140px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.8);
    background:rgba(0,0,0,.4);
    z-index:10;
  }
</style>
</head>
<body>

<div id="hud">
  <span class="box">Paquets: <span id="score">0</span></span>
  <span class="box">Distància: <span id="dist">0</span> m</span>
</div>
<div id="help">
  WASD / Fletxes = moure · Espai = pujar · Shift = baixar
</div>

<canvas id="bg"></canvas>
<canvas id="minimap"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const canvas = document.getElementById("bg");
const mapCanvas = document.getElementById("minimap");
const mapCtx = mapCanvas.getContext("2d");
const scoreEl = document.getElementById("score");
const distEl  = document.getElementById("dist");

// THREE bàsic
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x87ceeb, 1); // cel cartoon

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 80, 260);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 20, 40);

// Llum cartoon
const hemi = new THREE.HemisphereLight(0xffffff, 0x88c070, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(60,80,40);
scene.add(sun);

// Terra verd
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x7ccf5b, roughness:0.9})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Carrers grisos
const roads = new THREE.Group();
scene.add(roads);
(function createRoads(){
  const mat = new THREE.MeshStandardMaterial({color:0xdddddd, roughness:1});
  for(let i=-160;i<=160;i+=40){
    const r1 = new THREE.Mesh(new THREE.PlaneGeometry(400,8), mat);
    r1.rotation.x = -Math.PI/2;
    r1.position.z = i;
    roads.add(r1);
    const r2 = new THREE.Mesh(new THREE.PlaneGeometry(8,400), mat);
    r2.rotation.x = -Math.PI/2;
    r2.position.x = i;
    roads.add(r2);
  }
})();

// Edificis low‑poly de colors
const buildings = new THREE.Group();
scene.add(buildings);
(function createBuildings(){
  const palette = [0xffb347,0xff6961,0x77dd77,0x84b6f4,0xfdfd96,0xcdb4db];
  const rng = (a,b)=>a+Math.random()*(b-a);
  for(let x=-160;x<=160;x+=40){
    for(let z=-160;z<=160;z+=40){
      if(Math.abs(x)<40 && Math.abs(z)<40) continue; // zona base
      const count = 1+Math.floor(Math.random()*3);
      for(let i=0;i<count;i++){
        const w = rng(8,14);
        const d = rng(8,14);
        const h = rng(10,40);
        const geo = new THREE.BoxGeometry(w,h,d);
        const col = palette[Math.floor(Math.random()*palette.length)];
        const mat = new THREE.MeshStandardMaterial({color:col, roughness:0.8});
        const m = new THREE.Mesh(geo, mat);
        m.position.set(
          x + rng(-10,10),
          h/2,
          z + rng(-10,10)
        );
        buildings.add(m);
      }
    }
  }
})();

// Base central
const base = new THREE.Group();
scene.add(base);
const basePad = new THREE.Mesh(
  new THREE.CylinderGeometry(10,10,1,32),
  new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.8})
);
basePad.position.y = 0.5;
base.add(basePad);
const baseRing = new THREE.Mesh(
  new THREE.TorusGeometry(8,0.4,12,48),
  new THREE.MeshStandardMaterial({color:0x3b82f6, emissive:0x3b82f6, emissiveIntensity:0.7})
);
baseRing.rotation.x = Math.PI/2;
baseRing.position.y = 1.2;
base.add(baseRing);

// Dron low‑poly cartoon
const drone = new THREE.Group();
scene.add(drone);
(function createDrone(){
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(3,1,3),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  body.position.y = 0.5;
  drone.add(body);

  const nose = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,0.7,1.2),
    new THREE.MeshStandardMaterial({color:0x3b82f6})
  );
  nose.position.set(0,0.6,1.8);
  drone.add(nose);

  const armMat = new THREE.MeshStandardMaterial({color:0xcccccc});
  const rotorMat = new THREE.MeshStandardMaterial({color:0x111111});
  drone.rotors = [];

  const armGeo = new THREE.BoxGeometry(3.6,0.2,0.4);
  const armFront = new THREE.Mesh(armGeo, armMat);
  armFront.position.set(0,0.9,1.4);
  drone.add(armFront);
  const armBack = new THREE.Mesh(armGeo, armMat);
  armBack.position.set(0,0.9,-1.4);
  drone.add(armBack);

  const rotorGeo = new THREE.CylinderGeometry(0.5,0.5,0.15,12);
  const positions = [
    [1.8,1.1,1.4],
    [-1.8,1.1,1.4],
    [1.8,1.1,-1.4],
    [-1.8,1.1,-1.4],
  ];
  positions.forEach(p=>{
    const r = new THREE.Mesh(rotorGeo, rotorMat);
    r.rotation.x = Math.PI/2;
    r.position.set(p[0],p[1],p[2]);
    drone.add(r);
    drone.rotors.push(r);
  });

  const pkg = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,1,1.4),
    new THREE.MeshStandardMaterial({color:0xf97316})
  );
  pkg.position.y = -0.3;
  drone.add(pkg);

  drone.position.set(0,6,0);
})();

// Fletxa 3D que apunta al destí
const arrow = new THREE.Group();
scene.add(arrow);
(function createArrow(){
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1,0.1,3,8),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  shaft.rotation.z = Math.PI/2;
  arrow.add(shaft);
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.4,1,12),
    new THREE.MeshBasicMaterial({color:0x22c55e})
  );
  head.position.x = 1.8;
  head.rotation.z = Math.PI/2;
  arrow.add(head);
})();

// Destí
const target = new THREE.Mesh(
  new THREE.CylinderGeometry(2.5,2.5,0.6,24),
  new THREE.MeshStandardMaterial({color:0x22c55e, emissive:0x16a34a, emissiveIntensity:0.7})
);
target.position.set(40,0.3,40);
scene.add(target);

const targetRing = new THREE.Mesh(
  new THREE.TorusGeometry(3.2,0.25,10,32),
  new THREE.MeshBasicMaterial({color:0x22c55e})
);
targetRing.rotation.x = Math.PI/2;
targetRing.position.copy(target.position).setY(0.6);
scene.add(targetRing);

// Controls
const keys = {};
window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup",   e=>keys[e.code]=false);

const vel = new THREE.Vector3();
let score = 0;

function resetTarget(){
  const r = 160;
  const a = Math.random()*Math.PI*2;
  const d = 40 + Math.random()*(r-40);
  const x = Math.cos(a)*d;
  const z = Math.sin(a)*d;
  target.position.set(x,0.3,z);
  targetRing.position.copy(target.position).setY(0.6);
}

function updateDrone(dt){
  const dir = new THREE.Vector3(
    (keys["KeyA"]||keys["ArrowLeft"]?-1:0) + (keys["KeyD"]||keys["ArrowRight"]?1:0),
    (keys["Space"]?1:0) + (keys["ShiftLeft"]||keys["ShiftRight"]?-1:0),
    (keys["KeyW"]||keys["ArrowUp"]?-1:0) + (keys["KeyS"]||keys["ArrowDown"]?1:0)
  );

  if(dir.lengthSq()>0){
    dir.normalize().multiplyScalar(22*dt);
    vel.add(dir);
  }

  vel.multiplyScalar(0.9);
  vel.clampLength(0,25);

  drone.position.addScaledVector(vel, dt);
  drone.position.y = Math.max(3, Math.min(60, drone.position.y));

  // inclinació cartoon
  drone.rotation.z += (-vel.x*0.05 - drone.rotation.z)*0.15;
  drone.rotation.x += ( vel.z*0.05 - drone.rotation.x)*0.15;

  // hèlixs
  if(drone.rotors){
    drone.rotors.forEach(r=>r.rotation.y += 25*dt);
  }

  // càmera segueix
  const camOffset = new THREE.Vector3(0,18,32);
  const desired = drone.position.clone().add(camOffset);
  camera.position.lerp(desired, 0.08);
  camera.lookAt(drone.position.x, drone.position.y, drone.position.z);

  // fletxa cap al destí
  arrow.position.copy(drone.position).setY(drone.position.y+5);
  arrow.lookAt(target.position.x, target.position.y+2, target.position.z);

  // distància i entrega
  const dist = drone.position.distanceTo(target.position);
  distEl.textContent = dist.toFixed(1);
  if(dist<4 && Math.abs(drone.position.y-4)<3){
    score++;
    scoreEl.textContent = score;
    resetTarget();
  }
}

// mini‑mapa top‑down
function drawMinimap(){
  const ctx = mapCtx;
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const r = w/2;
  ctx.clearRect(0,0,w,h);

  ctx.save();
  ctx.translate(r,r);

  // fons
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fill();

  const scale = 0.25; // 400 -> 100

  // carrers
  ctx.strokeStyle = "rgba(220,220,220,0.6)";
  ctx.lineWidth = 2;
  for(let i=-160;i<=160;i+=40){
    ctx.beginPath();
    ctx.moveTo(-200*scale, i*scale);
    ctx.lineTo( 200*scale, i*scale);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(i*scale, -200*scale);
    ctx.lineTo(i*scale,  200*scale);
    ctx.stroke();
  }

  // base
  ctx.fillStyle = "#3b82f6";
  ctx.beginPath();
  ctx.arc(0,0,6,0,Math.PI*2);
  ctx.fill();

  // destí
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(target.position.x*scale, target.position.z*scale, 5, 0, Math.PI*2);
  ctx.fill();

  // dron
  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(drone.position.x*scale, drone.position.z*scale, 4, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;

  updateDrone(dt);
  targetRing.rotation.z += 0.8*dt;
  baseRing.rotation.z -= 0.4*dt;

  renderer.render(scene, camera);
  drawMinimap();
}
loop(performance.now());

window.addEventListener("resize", ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
