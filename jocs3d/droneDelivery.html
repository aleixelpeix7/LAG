<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<title>Drone Delivery 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { margin:0; overflow:hidden; background:#05070b; color:white; font-family:Arial }
#hud {
  position:fixed; top:10px; left:10px; right:10px;
  display:flex; justify-content:space-between;
  font-size:18px; text-shadow:0 0 6px black;
}
canvas { width:100%; height:100%; display:block; }
</style>
</head>

<body>

<div id="hud">
  <div>Paquets: <span id="score">0</span></div>
  <div>Distància: <span id="dist">0</span> m</div>
</div>

<canvas id="bg"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
const canvas = document.getElementById("bg");
const scoreEl = document.getElementById("score");
const distEl = document.getElementById("dist");

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x05070b, 40, 200);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 12, 26);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableZoom = false;

scene.add(new THREE.HemisphereLight(0x88bbff, 0x223344, 0.6));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({ color:0x11141c })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Drone
const drone = new THREE.Group();
scene.add(drone);

const body = new THREE.Mesh(
  new THREE.BoxGeometry(2.5,0.8,3),
  new THREE.MeshStandardMaterial({ color:0x4ade80 })
);
drone.add(body);

const pkg = new THREE.Mesh(
  new THREE.BoxGeometry(1.2,0.8,1.2),
  new THREE.MeshStandardMaterial({ color:0xf97316 })
);
pkg.position.y = -1;
drone.add(pkg);

drone.position.set(0,5,0);

// Target
const target = new THREE.Mesh(
  new THREE.CylinderGeometry(2.5,2.5,0.4,24),
  new THREE.MeshStandardMaterial({ color:0x22c55e, emissive:0x16a34a })
);
target.position.set(20,0.2,20);
scene.add(target);

const ring = new THREE.Mesh(
  new THREE.TorusGeometry(3.2,0.12,8,32),
  new THREE.MeshBasicMaterial({ color:0x4ade80 })
);
ring.rotation.x = Math.PI/2;
ring.position.copy(target.position);
scene.add(ring);

// Controls
const keys = {};
onkeydown = e => keys[e.code] = true;
onkeyup   = e => keys[e.code] = false;

const vel = new THREE.Vector3();
let score = 0;

function resetTarget() {
  const a = Math.random()*Math.PI*2;
  const d = 40 + Math.random()*120;
  target.position.set(Math.cos(a)*d, 0.2, Math.sin(a)*d);
  ring.position.copy(target.position);
}

function updateDrone(dt) {
  const dir = new THREE.Vector3(
    (keys["KeyA"]?-1:0) + (keys["KeyD"]?1:0),
    (keys["Space"]?1:0) + (keys["ShiftLeft"]?-1:0),
    (keys["KeyW"]?-1:0) + (keys["KeyS"]?1:0)
  );

  if (dir.lengthSq() > 0) {
    dir.normalize().multiplyScalar(18*dt);
    vel.add(dir);
  }

  vel.multiplyScalar(0.9);
  vel.clampLength(0,20);

  drone.position.addScaledVector(vel, dt);

  drone.position.y = Math.max(2, Math.min(60, drone.position.y));

  const dist = drone.position.distanceTo(target.position);
  distEl.textContent = dist.toFixed(1);

  if (dist < 4 && Math.abs(drone.position.y - 4) < 3) {
    score++;
    scoreEl.textContent = score;
    resetTarget();
  }

  camera.position.lerp(drone.position.clone().add(new THREE.Vector3(0,12,26)), 0.08);
  controls.target.lerp(drone.position.clone(), 0.1);
  controls.update();
}

let last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;

  updateDrone(dt);
  ring.rotation.z += 0.8*dt;

  renderer.render(scene, camera);
}
loop(performance.now());

onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>

</body>
</html>
