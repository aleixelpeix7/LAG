<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Minecraft | LAG</title>
  <link rel="icon" href="assets/favicon_minecraft.png" type="image/png" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#002244;
      --accent:#7CCF35;
      --nav-bg: rgba(0,0,0,0.7);
    }

    html,body{height:100%; margin:0; padding:0;}
    *,*::before,*::after{box-sizing:border-box}

    @font-face { 
      font-family: 'Minecraftia';
      src: url('assets/Minecraftia.woff') format('woff'); 
      font-weight: normal; 
      font-style: normal; 
    }
    
    body {
      background-image: url("assets/dirt_background.png");
      background-repeat: repeat;
      background-size: 128px 128px;
      font-family: 'Minecraftia', sans-serif;
      color: var(--accent);
    }

    nav {
      background-color: var(--nav-bg);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav ul { list-style:none; display:flex; justify-content:space-between; align-items:center; margin:0; padding:0; }
    nav li.logo { display:flex; align-items:center; }
    nav li.logo a { display:flex; align-items:center; text-decoration:none; }
    nav li.logo img { height:60px; margin-right:0.5rem; vertical-align:middle; }
    nav a { color:white; text-decoration:none; font-weight:bold; transition:color 0.3s; }
    nav a:hover { color:#ffff66; }

    main { padding:2rem; min-height: calc(100vh - 120px); }

    /* Targetes translúcides estil Minecraft */
    .lag-card {
      display: block;
      width: fit-content;
      padding: 18px 28px;
      margin: 20px 0;
      background: rgba(0, 0, 0, 0.55); /* translúcid */
      border: 3px solid #7CCF35;
      border-radius: 6px;
      color: #7CCF35;
      font-size: 26px;
      text-decoration: none;
      transition: 0.25s;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .lag-card:hover {
      background: rgba(0, 0, 0, 0.75);
      border-color: #A6FF5A;
      color: #A6FF5A;
      transform: translateX(6px);
      box-shadow: 0 0 14px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li class="logo">
        <a href="https://lagg.netlify.app">
          <img src="assets/logo_minecraft.png" alt="Logo LAG" />
        </a>
      </li>
     <li class="enllacos">
       <a href="https://lagg.netlify.app">Inici</a>
       <a href="https://lagg.netlify.app/minijocs/">Minijocs</a>
       <a href="https://lagg.netlify.app/eines/">Eines</a>
       <a href="https://lagg.netlify.app/contacte">Contactar</a>
     </li>
    </ul>
  </nav>

  <main>

    <a class="lag-card" href="https://lagg.netlify.app/minecraft/1.8">Versió 1.8 — Més antiga però estable</a>

    <a class="lag-card" href="https://lagg.netlify.app/minecraft/1.12">Versió 1.12 — Més moderna però inestable</a>

  </main>

</body>
</html>
