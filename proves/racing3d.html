<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Autopista 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Scene
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x111111, 20, 200);

  // Camera
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 12);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(5, 10, 5);
  dir.castShadow = true;
  scene.add(dir);

  // Road parameters
  const ROAD_WIDTH = 12;
  const ROAD_LENGTH = 40;
  const SEGMENTS = 6;

  const roadTiles = [];

  function createRoadTile(z) {
    const geo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH);
    const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.z = z;
    scene.add(mesh);
    return mesh;
  }

  for (let i = 0; i < SEGMENTS; i++) {
    roadTiles.push(createRoadTile(-i * ROAD_LENGTH));
  }

  // Lane lines
  const laneCount = 3;
  const laneWidth = ROAD_WIDTH / laneCount;
  const lanePositions = [
    -ROAD_WIDTH / 2 + laneWidth / 2,
    0,
    ROAD_WIDTH / 2 - laneWidth / 2
  ];

  function createLaneLines() {
    const group = new THREE.Group();
    for (let i = 1; i < laneCount; i++) {
      const geo = new THREE.PlaneGeometry(0.15, ROAD_LENGTH);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const line = new THREE.Mesh(geo, mat);
      line.rotation.x = -Math.PI / 2;
      line.position.x = -ROAD_WIDTH / 2 + i * laneWidth;
      group.add(line);
    }
    return group;
  }

  const laneGroups = [];
  for (let i = 0; i < SEGMENTS; i++) {
    const g = createLaneLines();
    g.position.z = -i * ROAD_LENGTH;
    scene.add(g);
    laneGroups.push(g);
  }

  // Player car
  const playerGeo = new THREE.BoxGeometry(1.5, 0.7, 3);
  const playerMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
  const player = new THREE.Mesh(playerGeo, playerMat);
  player.position.set(0, 0.5, 8);
  scene.add(player);

  let currentLane = 1;
  let targetX = lanePositions[currentLane];

  // Enemies
  const enemies = [];
  const enemySpeed = 0.6;

  function spawnEnemy() {
    const geo = new THREE.BoxGeometry(1.5, 0.7, 3);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const enemy = new THREE.Mesh(geo, mat);

    const lane = Math.floor(Math.random() * laneCount);
    enemy.position.x = lanePositions[lane];
    enemy.position.y = 0.5;
    enemy.position.z = -120;

    enemy.userData.box = new THREE.Box3().setFromObject(enemy);

    scene.add(enemy);
    enemies.push(enemy);
  }

  let spawnTimer = 0;

  // Input
  const keys = { left: false, right: false };

  window.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" || e.key === "a") keys.left = true;
    if (e.key === "ArrowRight" || e.key === "d") keys.right = true;
  });

  window.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
    if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
  });

  function updateLane() {
    if (keys.left && currentLane > 0) {
      currentLane--;
      targetX = lanePositions[currentLane];
      keys.left = false;
    }
    if (keys.right && currentLane < laneCount - 1) {
      currentLane++;
      targetX = lanePositions[currentLane];
      keys.right = false;
    }
  }

  // Game loop
  function update() {
    updateLane();

    // Smooth lane movement
    player.position.x += (targetX - player.position.x) * 0.15;

    // Move road
    for (let i = 0; i < SEGMENTS; i++) {
      roadTiles[i].position.z += 0.5;
      laneGroups[i].position.z += 0.5;

      if (roadTiles[i].position.z > ROAD_LENGTH) {
        roadTiles[i].position.z -= ROAD_LENGTH * SEGMENTS;
        laneGroups[i].position.z -= ROAD_LENGTH * SEGMENTS;
      }
    }

    // Enemies
    spawnTimer++;
    if (spawnTimer > 60) {
      spawnEnemy();
      spawnTimer = 0;
    }

    const playerBox = new THREE.Box3().setFromObject(player);

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.position.z += enemySpeed;
      e.userData.box.setFromObject(e);

      if (e.position.z > 40) {
        scene.remove(e);
        enemies.splice(i, 1);
        continue;
      }

      if (playerBox.intersectsBox(e.userData.box)) {
        console.log("COL·LISIÓ REAL!");
      }
    }
  }

  function loop() {
    requestAnimationFrame(loop);
    update();
    renderer.render(scene, camera);
  }

  loop();

  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
