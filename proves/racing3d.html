<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Autopista 3D</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }

    .ui {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .panel {
      pointer-events: auto;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 24px 32px;
      border-radius: 12px;
      text-align: center;
      min-width: 260px;
    }
    .panel h1 { margin: 0 0 12px; font-size: 24px; }
    .panel p { margin: 4px 0; }
    .panel .btn {
      margin-top: 16px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #fff;
      display: inline-block;
      cursor: pointer;
      font-size: 14px;
    }

    .level-btn {
      display: inline-block;
      margin: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid #fff;
      cursor: pointer;
      user-select: none;
    }
    .level-selected {
      background: #fff;
      color: #000;
      font-weight: bold;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 0 4px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="hud">Velocitat: 0 km/h<br>Distància: 0.0 km</div>

<!-- MENÚ INICI -->
<div class="ui" id="menu-start">
  <div class="panel">
    <h1>Autopista 3D</h1>
    <p>Selecciona el nivell:</p>

    <div id="level-easy" class="level-btn level-selected">Fàcil</div>
    <div id="level-medium" class="level-btn">Mitjà</div>
    <div id="level-hard" class="level-btn">Difícil</div>

    <div class="btn" id="btn-start">Començar</div>
  </div>
</div>

<!-- MENÚ PAUSA -->
<div class="ui" id="menu-pause" style="display:none;">
  <div class="panel">
    <h1>Pausa</h1>
    <p>Prem ESC per continuar</p>
    <div class="btn" id="btn-pause-menu">Tornar a l'inici</div>
  </div>
</div>

<!-- MENÚ MORT -->
<div class="ui" id="menu-dead" style="display:none;">
  <div class="panel">
    <h1>Has xocat!</h1>
    <p id="death-distance">Has fet 0.0 km</p>
    <div class="btn" id="btn-dead-menu">Tornar al menú</div>
  </div>
</div>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  // UI
  const hud = document.getElementById('hud');
  const menuStart = document.getElementById('menu-start');
  const menuPause = document.getElementById('menu-pause');
  const menuDead = document.getElementById('menu-dead');

  const btnStart = document.getElementById('btn-start');
  const btnPauseMenu = document.getElementById('btn-pause-menu');
  const btnDeadMenu = document.getElementById('btn-dead-menu');

  const levelEasy = document.getElementById('level-easy');
  const levelMedium = document.getElementById('level-medium');
  const levelHard = document.getElementById('level-hard');

  const deathDistanceEl = document.getElementById('death-distance');

  let gameState = 'menu';
  let difficulty = "easy";
  let spawnInterval = 1.2;

  function showMenu(id) {
    menuStart.style.display = id === 'start' ? 'flex' : 'none';
    menuPause.style.display = id === 'pause' ? 'flex' : 'none';
    menuDead.style.display = id === 'dead' ? 'flex' : 'none';
  }

  // Selecció de nivell
  function selectLevel(level) {
    difficulty = level;

    levelEasy.classList.remove("level-selected");
    levelMedium.classList.remove("level-selected");
    levelHard.classList.remove("level-selected");

    if (level === "easy") { levelEasy.classList.add("level-selected"); spawnInterval = 1.2; }
    if (level === "medium") { levelMedium.classList.add("level-selected"); spawnInterval = 0.8; }
    if (level === "hard") { levelHard.classList.add("level-selected"); spawnInterval = 0.45; }
  }

  levelEasy.onclick = () => selectLevel("easy");
  levelMedium.onclick = () => selectLevel("medium");
  levelHard.onclick = () => selectLevel("hard");

  btnStart.onclick = () => {
    resetGame(false);
    gameState = 'playing';
    showMenu(null);
  };

  btnPauseMenu.onclick = () => {
    gameState = 'menu';
    showMenu('start');
    resetGame(true);
  };

  btnDeadMenu.onclick = () => {
    gameState = 'menu';
    showMenu('start');
    resetGame(true);
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (gameState === 'playing') {
        gameState = 'paused';
        showMenu('pause');
      } else if (gameState === 'paused') {
        gameState = 'playing';
        showMenu(null);
      }
    }
  });

  // Three.js bàsic
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x87a0c0, 40, 260);
  renderer.setClearColor(0x87a0c0);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

  const hemi = new THREE.HemisphereLight(0xddeeff, 0x223322, 0.7);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(40, 60, 20);
  dir.castShadow = true;
  dir.shadow.mapSize.set(2048, 2048);
  scene.add(dir);

  // Carretera
  const ROAD_WIDTH = 12;
  const ROAD_LENGTH = 50;
  const SEGMENTS = 8;

  const segmentGroups = [];

  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2f6f2f });
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x303030 });

  function createSegment(zIndex) {
    const group = new THREE.Group();

    // Terra
    const groundGeo = new THREE.PlaneGeometry(200, ROAD_LENGTH);
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.02;
    group.add(ground);

    // Carretera
    const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH);
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    group.add(road);

    // Línies discontínues
    const laneGroup = new THREE.Group();
    const dashGeo = new THREE.PlaneGeometry(0.15, 3);
    const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    for (let i = 1; i < 3; i++) {
      const x = -ROAD_WIDTH / 2 + (ROAD_WIDTH / 3) * i;
      for (let z = -25; z < 25; z++) {
        const dash = new THREE.Mesh(dashGeo, dashMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(x, 0.002, z * 3);
        laneGroup.add(dash);
      }
    }
    group.add(laneGroup);

    // Barreres
    const railMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
    const postGeo = new THREE.BoxGeometry(0.2, 1, 0.2);
    const barGeo = new THREE.BoxGeometry(0.2, 0.2, 4);

    function addRail(x) {
      for (let i = -6; i <= 6; i++) {
        const post = new THREE.Mesh(postGeo, railMat);
        post.position.set(x, 0.5, i * 4);
        group.add(post);

        const bar = new THREE.Mesh(barGeo, railMat);
        bar.position.set(x, 0.9, i * 4);
        group.add(bar);
      }
    }

    addRail(-ROAD_WIDTH / 2 - 1);
    addRail(ROAD_WIDTH / 2 + 1);

    // Arbres
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5b3a1a });
    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2f8f3a });

    const trunkGeo = new THREE.CylinderGeometry(0.25, 0.35, 2, 8);
    const leavesGeo = new THREE.ConeGeometry(1.2, 3, 10);

    function addTree(x, z) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 1;
      tree.add(trunk);

      const leaves = new THREE.Mesh(leavesGeo, leavesMat);
      leaves.position.y = 3;
      tree.add(leaves);

      tree.position.set(x, 0, z);
      group.add(tree);
    }

    for (let i = -6; i <= 6; i++) {
      if (Math.random() < 0.7) addTree(-ROAD_WIDTH / 2 - 4 - Math.random() * 4, i * 4);
      if (Math.random() < 0.7) addTree( ROAD_WIDTH / 2 + 4 + Math.random() * 4, i * 4);
    }

    group.position.z = -zIndex * ROAD_LENGTH;
    scene.add(group);
    return group;
  }

  for (let i = 0; i < SEGMENTS; i++) {
    segmentGroups.push(createSegment(i));
  }

  // Cotxes
  function createCar(colorBody, colorCabin, isPlayer = false) {
    const group = new THREE.Group();

    const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 3.4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: colorBody });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.5;
    group.add(body);

    const cabinGeo = new THREE.BoxGeometry(1.2, 0.5, 1.8);
    const cabinMat = new THREE.MeshStandardMaterial({ color: colorCabin });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 0.9, -0.2);
    group.add(cabin);

    const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

    function addWheel(x, z) {
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(x, 0.25, z);
      group.add(w);
    }

    addWheel(-0.8, 1.2);
    addWheel(0.8, 1.2);
    addWheel(-0.8, -1.2);
    addWheel(0.8, -1.2);

    const lightGeo = new THREE.BoxGeometry(0.2, 0.1, 0.1);

    // FARS DAVANT
    const frontLightMat = new THREE.MeshBasicMaterial({
      color: isPlayer ? 0xff3333 : 0xffdd55
    });

    const fl1 = new THREE.Mesh(lightGeo, frontLightMat);
    fl1.position.set(-0.6, 0.4, 1.7);
    group.add(fl1);

    const fl2 = fl1.clone();
    fl2.position.x = 0.6;
    group.add(fl2);

    // FARS DARRERE (vermells per tots)
    const rearLightMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });

    const rl1 = new THREE.Mesh(lightGeo, rearLightMat);
    rl1.position.set(-0.6, 0.4, -1.7);
    group.add(rl1);

    const rl2 = rl1.clone();
    rl2.position.x = 0.6;
    group.add(rl2);

    return group;
  }

  const player = createCar(0x0077ff, 0xeeeeff, true);
  player.position.set(0, 0, 8);
  scene.add(player);

  const enemies = [];
  const enemyColors = [0xff3333, 0xffaa00, 0x00cc66, 0x9933ff, 0xffffff, 0x00bcd4];

  function spawnEnemy() {
    const bodyColor = enemyColors[Math.floor(Math.random() * enemyColors.length)];
    const enemy = createCar(bodyColor, 0xeeeeff, false);

    const laneWidth = ROAD_WIDTH / 3;
    const lanePositions = [
      -ROAD_WIDTH / 2 + laneWidth / 2,
      0,
      ROAD_WIDTH / 2 - laneWidth / 2
    ];
    const lane = Math.floor(Math.random() * 3);

    enemy.position.set(lanePositions[lane], 0, -150 - Math.random() * 80);
    enemy.userData.box = new THREE.Box3().setFromObject(enemy);
    enemy.userData.exploding = false;
    enemy.userData.explodeTime = 0;
    scene.add(enemy);
    enemies.push(enemy);
  }

  // Controls
  const keys = { left: false, right: false, up: false, down: false };

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === 'ArrowUp') keys.up = true;
    if (e.key === 'ArrowDown') keys.down = true;
  });

  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
    if (e.key === 'ArrowUp') keys.up = false;
    if (e.key === 'ArrowDown') keys.down = false;
  });

  // --- LA FÍSICA COMENÇA AQUÍ ---
  // Física
  let speed = 0;            // km/h reals
  const maxSpeed = 160;     // velocitat màxima realista
  const accel = 55;         // acceleració km/h per segon
  const brake = 90;         // frenada km/h per segon
  const friction = 25;      // desacceleració natural
  let lateralVel = 0;
  const lateralAccel = 40;
  let distanceKm = 0;
  let spawnTimer = 0;

  function resetGame(keepCamera) {
    speed = 0;
    distanceKm = 0;
    lateralVel = 0;
    player.position.set(0, 0, 8);
    player.rotation.set(0, 0, 0);

    enemies.forEach(e => scene.remove(e));
    enemies.length = 0;

    segmentGroups.forEach((g, i) => {
      g.position.z = -i * ROAD_LENGTH;
    });

    if (!keepCamera) {
      const camOffset = new THREE.Vector3(0, 7, 16);
      const desired = player.position.clone().add(camOffset);
      camera.position.copy(desired);
      camera.lookAt(player.position.x, player.position.y + 1, player.position.z - 6);
    }
  }

  function updatePhysics(dt) {
    // Acceleració longitudinal (km/h → km/h)
    if (keys.up) speed += accel * dt;
    if (keys.down) speed -= brake * dt;
    if (!keys.up && !keys.down) {
      if (speed > 0) speed -= friction * dt;
      if (speed < 0) speed += friction * dt;
    }
    speed = Math.max(0, Math.min(maxSpeed, speed));

    // Convertir a m/s per calcular distància real
    const speedMS = speed / 3.6;
    const worldSpeed = speedMS * dt;

    // Carretera infinita
    segmentGroups.forEach(g => {
      g.position.z += worldSpeed;
      if (g.position.z > ROAD_LENGTH) {
        g.position.z -= ROAD_LENGTH * SEGMENTS;
      }
    });

    // Moviment lateral
    const turnFactor = 0.4 + (speed / maxSpeed) * 0.8;

    if (keys.left) lateralVel -= lateralAccel * turnFactor * dt;
    if (keys.right) lateralVel += lateralAccel * turnFactor * dt;

    if (!keys.left && !keys.right) lateralVel *= 0.92;

    lateralVel = Math.max(-15, Math.min(15, lateralVel));

    // ❗ NO es pot moure lateralment si està parat
    if (speed > 1) {
      player.position.x += lateralVel * dt;
    }

    const limitX = ROAD_WIDTH / 2 - 1.2;
    player.position.x = Math.max(-limitX, Math.min(limitX, player.position.x));

    // ❗ NO gira si està parat
    if (speed > 1) {
      player.rotation.y = -lateralVel * 0.01;
      player.rotation.z = lateralVel * 0.002;
    } else {
      player.rotation.y = 0;
      player.rotation.z = 0;
    }

    // Distància realista
    distanceKm += (speedMS * dt) / 1000;

    // Enemics segons dificultat
    spawnTimer += dt;
    if (spawnTimer > spawnInterval) {
      spawnEnemy();
      spawnTimer = 0;
    }

    const playerBox = new THREE.Box3().setFromObject(player);

    // Moviment enemics + col·lisions
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];

      // Moure enemic cap a tu
      e.position.z += worldSpeed + 12 * dt;
      e.userData.box.setFromObject(e);

      // Eliminar si passa
      if (e.position.z > 80) {
        scene.remove(e);
        enemies.splice(i, 1);
        continue;
      }

      // ❗ COL·LISIÓ REALISTA
      if (playerBox.intersectsBox(e.userData.box)) {
        triggerExplosion();   // tremolor
        gameOver();           // menú de mort
        return;               // atura la física immediatament
      }
    }

    // Càmera
    const camOffset = new THREE.Vector3(0, 7, 16);
    const desired = player.position.clone().add(camOffset);
    camera.position.lerp(desired, 0.12);
    camera.lookAt(player.position.x, player.position.y + 1, player.position.z - 6);

    // HUD
    hud.innerHTML =
      `Velocitat: ${speed.toFixed(0)} km/h<br>` +
      `Distància: ${distanceKm.toFixed(2)} km`;
  }

  // Tremolor de càmera
  function triggerExplosion() {
    const originalPos = camera.position.clone();
    let t = 0;
    const shake = () => {
      if (t > 0.3) {
        camera.position.copy(originalPos);
        return;
      }
      t += 0.016;
      camera.position.x = originalPos.x + (Math.random() - 0.5) * 0.6;
      camera.position.y = originalPos.y + (Math.random() - 0.5) * 0.4;
      requestAnimationFrame(shake);
    };
    shake();
  }

  // Loop principal
  let lastTime = performance.now();

  function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    if (gameState === 'playing') {
      updatePhysics(dt);
    } else if (gameState === 'menu') {
      const camOffset = new THREE.Vector3(0, 10, 22);
      const desired = player.position.clone().add(camOffset);
      camera.position.lerp(desired, 0.1);
      camera.lookAt(player.position.x, player.position.y + 1, player.position.z - 4);
    }

    renderer.render(scene, camera);
  }

  loop(performance.now());

  // Resize
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  resetGame(false);
  showMenu('start');
</script>

</body>
</html>
