<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Joc 3D Autopista</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Scene
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x202020, 10, 200);

  // Camera
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 5, 15);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5, 10, 5);
  scene.add(dir);

  // Road
  const roadWidth = 10;
  const roadLength = 400;

  const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength);
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.z = -roadLength / 2;
  scene.add(road);

  // Lane lines
  const laneCount = 3;
  const laneWidth = roadWidth / laneCount;
  const laneLines = new THREE.Group();

  for (let i = 1; i < laneCount; i++) {
    const lineGeo = new THREE.PlaneGeometry(0.1, roadLength);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.x = -roadWidth / 2 + i * laneWidth;
    line.position.z = -roadLength / 2;
    laneLines.add(line);
  }
  scene.add(laneLines);

  // Player car
  const player = new THREE.Group();
  const carGeo = new THREE.BoxGeometry(1.5, 0.7, 3);
  const carMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
  const car = new THREE.Mesh(carGeo, carMat);
  car.position.y = 0.5;
  player.add(car);
  player.position.set(0, 0, 5);
  scene.add(player);

  let currentLane = 1;
  const lanePositions = [
    -roadWidth / 2 + laneWidth / 2,
    0,
    roadWidth / 2 - laneWidth / 2
  ];

  // Enemies
  const enemies = [];
  const enemySpeed = 0.4;

  function spawnEnemy() {
    const enemy = new THREE.Group();
    const geo = new THREE.BoxGeometry(1.5, 0.7, 3);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.5;
    enemy.add(mesh);

    const lane = Math.floor(Math.random() * laneCount);
    enemy.position.x = lanePositions[lane];
    enemy.position.z = -200;

    scene.add(enemy);
    enemies.push(enemy);
  }

  let spawnTimer = 0;

  // Input
  const keys = { left: false, right: false };

  window.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" || e.key === "a") keys.left = true;
    if (e.key === "ArrowRight" || e.key === "d") keys.right = true;
  });

  window.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
    if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
  });

  function updateLane() {
    if (keys.left && currentLane > 0) {
      currentLane--;
      keys.left = false;
    }
    if (keys.right && currentLane < laneCount - 1) {
      currentLane++;
      keys.right = false;
    }
  }

  // Game loop
  let roadOffset = 0;

  function update() {
    roadOffset += 0.5;
    road.position.z = -roadLength / 2 + (roadOffset % roadLength);
    laneLines.position.z = road.position.z;

    updateLane();
    player.position.x = lanePositions[currentLane];

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.position.z += enemySpeed;

      if (e.position.z > 50) {
        scene.remove(e);
        enemies.splice(i, 1);
        continue;
      }

      const dz = Math.abs(e.position.z - player.position.z);
      const dx = Math.abs(e.position.x - player.position.x);
      if (dz < 2 && dx < 1) console.log("COL·LISIÓ!");
    }

    spawnTimer++;
    if (spawnTimer > 80) {
      spawnEnemy();
      spawnTimer = 0;
    }
  }

  function loop() {
    requestAnimationFrame(loop);
    update();
    renderer.render(scene, camera);
  }

  loop();

  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
